    <style>

            --bg2: #0d0d26;

            --accent2: #7b2fff;
            --text: #c8d8f0;
            --text-dim: #5a70a0;
            --heading: #e8f4ff;
            --card: rgba(255, 255, 255, 0.025);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 400;
            line-height: 1.8;
            font-size: 16px;
        }

            content: '';
            position: fixed;
            inset: 0;

            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;

        header {

            z-index: 1;

            align-items: center;
            justify-content: center;
            width: 76px;
            height: 76px;
            border: 2px solid var(--accent);
            border-radius: 50%;

            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: -2px;
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            opacity: .7;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(18px, 5vw, 32px);
            font-weight: 700;
            color: var(--heading);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: .5px;
        }

        .lang-bar {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
        }

            font-size: 13px;
            font-weight: 500;
            padding: 4px 11px;

            white-space: nowrap;

            background: rgba(0, 212, 255, 0.12);
            border-color: var(--accent);
            color: var(--accent);
        }

        .lang-btn.active {
            background: rgba(0, 212, 255, 0.16);
            border-color: var(--accent);
            color: var(--accent);
        }

            position: relative;
            z-index: 1;
            max-width: 840px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .pp-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px 32px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .pp-section::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            border-radius: 3px 0 0 3px;
        }

        [dir="rtl"] .pp-section::before {
            left: auto;
            right: 0;
            border-radius: 0 3px 3px 0;
        }

        .pp-section h2 {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .pp-section p {
            margin-bottom: 12px;
            color: var(--text);
        }

        .pp-section p:last-child {
            margin-bottom: 0;
        }

        .pp-section ul {
            padding-left: 20px;
            margin-bottom: 12px;
        }

        [dir="rtl"] .pp-section ul {
            padding-left: 0;
            padding-right: 20px;
        }

        .pp-section li {
            margin-bottom: 6px;
            color: var(--text);
        }

        .pp-section li::marker {
            color: var(--accent);
        }

        .pp-section strong {
            color: var(--heading);
            font-weight: 600;
        }

        .pp-section a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 212, 255, .3);
        }

        .pp-section a:hover {
            border-color: var(--accent);
        }

        .pp-section code {
            font-size: 13px;
            background: rgba(0, 212, 255, .08);
            border: 1px solid rgba(0, 212, 255, .2);
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--accent);
        }

        .badge {
            display: inline-block;
            background: rgba(0, 212, 255, .1);
            border: 1px solid rgba(0, 212, 255, .25);
            border-radius: 4px;
            padding: 2px 12px;
            font-size: 11px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .contact-box {
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 212, 255, .06), rgba(123, 47, 255, .06));
            border: 1px solid rgba(0, 212, 255, .2);
            border-radius: 8px;
            padding: 36px 24px;
            margin-top: 32px;

        .contact-box h2 {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

            font-family: 'Orbitron', monospace;
            font-size: 15px;
            color: var(--accent);
            letter-spacing: 1px;
            margin: 8px 0 16px;

            font-size: 13px;
            color: var(--text-dim);

        .contact-sub a {
            color: var(--text-dim);
            text-decoration: none;
        }

        .contact-sub a:hover {
            color: var(--accent);
        }

            position: relative;
            z-index: 1;
            text-align: center;
            padding: 22px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: .5px;
        }

            color: var(--text-dim);
            text-decoration: none;
        }

                usage: { heading: "Verwendung der Informationen", items: ["Anzeige von Werbung über Google AdMob (Banner-, Interstitial- und Rewarded-Video-Anzeigen).", "Überwachung der App-Stabilität und Diagnose technischer Probleme per Absturzberichten.", "Analyse aggregierter Spielmuster zur Verbesserung künftiger Spielfunktionen.", "Einhaltung gesetzlicher Verpflichtungen."] },
                advertising: { heading: "Werbung &amp; Google AdMob", text: ["Sudoku 9 verwendet <strong>Google AdMob</strong> zur Werbeanzeige. AdMob kann Daten gemäß Googles eigener Datenschutzrichtlinie und Nutzungsbedingungen erheben und verarbeiten.", "Beim ersten Start werden Sie um Einwilligung oder Ablehnung für <strong>personalisierte Werbung</strong> gebeten. Bei Ablehnung werden stattdessen nicht personalisierte (kontextbezogene) Anzeigen gezeigt. Sie können Ihre Präferenz jederzeit unter <strong>Einstellungen → Datenschutz</strong> in der App ändern."], links: [{ label: "Google Datenschutzrichtlinie", url: "https://policies.google.com/privacy" }, { label: "Personalisierte Werbung deaktivieren", url: "https://adssettings.google.com" }], noSell: "Wir verkaufen Ihre personenbezogenen Daten nicht an Dritte." },
                sharing: { heading: "Datenweitergabe &amp; Dritte", intro: "Wir verkaufen, tauschen oder vermieten Ihre persönlichen Daten nicht. Begrenzte aggregierte Daten können geteilt werden mit:", items: ["<strong>Google AdMob</strong> — für Anzeigenauslieferung und -messung.", "<strong>Behörden</strong> — wenn dies zur Einhaltung geltender Gesetze, Gerichtsbeschlüsse oder behördlicher Vorschriften erforderlich ist."], note: "Alle Drittanbieter-Dienste haben eigene Datenschutzrichtlinien, die die Verwendung Ihrer Daten regeln." },
                children: { heading: "Datenschutz für Kinder", text: ["Sudoku 9 richtet sich nicht an Kinder unter <strong>13 Jahren</strong>. Wir erheben wissentlich keine personenbezogenen Daten von Kindern.", "Wenn Sie Elternteil oder Erziehungsberechtigter sind und glauben, dass Ihr Kind uns Daten bereitgestellt hat, kontaktieren Sie uns bitte unter der unten stehenden Adresse — wir werden diese Daten umgehend löschen.", "Die App verwendet keine kindgerichteten Werbeeinstellungen (COPPA) und wurde nicht als „Für Familien konzipiert\" eingereicht."] },
                rights: { heading: "Ihre Rechte (DSGVO &amp; US-Datenschutz)", intro: "Je nach Ihrem Wohnort haben Sie möglicherweise folgende Rechte:", items: ["<strong>Auskunft:</strong> Kopie der über Sie gespeicherten personenbezogenen Daten anfordern.", "<strong>Berichtigung:</strong> Korrektur unrichtiger Daten verlangen.", "<strong>Löschung:</strong> Löschung Ihrer personenbezogenen Daten verlangen.", "<strong>Einschränkung:</strong> Einschränkung der Verarbeitung verlangen.", "<strong>Datenübertragbarkeit:</strong> Daten in maschinenlesbarem Format anfordern.", "<strong>Widerspruch:</strong> Der Verarbeitung auf Grundlage berechtigter Interessen widersprechen.", "<strong>Einwilligung widerrufen:</strong> Werbeeinwilligung jederzeit in der App widerrufen."], legal: "Für EU/EWR-Nutzer ist unsere Rechtsgrundlage für die Verarbeitung von Werbedaten Ihre <strong>ausdrückliche Einwilligung</strong>, die über unseren In-App-Einwilligungsbildschirm eingeholt wird. Nutzer in US-Bundesstaaten mit geltenden Datenschutzgesetzen (CCPA/CPRA, CDPA, CPA usw.) können der Weitergabe personenbezogener Daten jederzeit über die In-App-Einstellungen widersprechen. Wenden Sie sich für die Ausübung dieser Rechte an die unten angegebene Adresse." },
                security: { heading: "Sicherheit", text: ["Wir treffen angemessene technische und organisatorische Maßnahmen zum Schutz der von uns verarbeiteten Daten. Keine Übertragungsmethode über das Internet oder elektronische Speicherung ist jedoch zu 100 % sicher; wir können keine absolute Sicherheit garantieren."] },
                changes: { heading: "Änderungen dieser Richtlinie", text: ["Wir können diese Datenschutzerklärung von Zeit zu Zeit aktualisieren. In diesem Fall werden wir das Datum „Letzte Aktualisierung\" oben auf dieser Seite anpassen. Wir empfehlen Ihnen, diese Richtlinie regelmäßig zu überprüfen.", "Die fortgesetzte Nutzung von Sudoku 9 nach Änderungen gilt als Zustimmung zur aktualisierten Richtlinie."] },
                contact: { heading: "Kontakt", pre: "Bei Fragen oder Anfragen zu dieser Datenschutzerklärung kontaktieren Sie uns bitte:", sub: "Hexlume Games &nbsp;·&nbsp; Unabhängiger Spieleentwickler" }
            },

            /* ── FRANÇAIS ── */
            fr: {
                label: "🇫🇷 Français", dir: "ltr", title: "Politique de Confidentialité",
                overview: { badge: "Aperçu", text: ["Hexlume Games (« nous ») a développé <strong>Sudoku 9</strong> en tant qu'application mobile gratuite. Cette Politique de confidentialité explique quelles informations nous collectons, comment nous les utilisons et les choix dont vous disposez.", "En téléchargeant ou en utilisant Sudoku 9, vous acceptez cette politique. Si vous n'êtes pas d'accord, veuillez cesser d'utiliser l'application."] },
                collection: { heading: "Informations Collectées", intro: "Nous collectons les types d'informations suivants :", items: ["<strong>Données techniques :</strong> Modèle d'appareil, version du système d'exploitation, version de l'application, langue et localisation générale (pays/région). Collectées automatiquement via nos partenaires publicitaires et analytiques.", "<strong>Données d'utilisation :</strong> Comportement dans l'application (sessions jouées, niveaux de difficulté sélectionnés, interactions) — uniquement pour améliorer l'expérience de jeu.", "<strong>Identifiants publicitaires :</strong> Avec votre consentement, Google AdMob peut collecter des identifiants publicitaires pour diffuser des annonces personnalisées.", "<strong>Progression (locale uniquement) :</strong> Vos progrès, statistiques et paramètres sont stockés uniquement sur votre appareil via <code>localStorage</code>. Nous ne transmettons pas ces données à un serveur."], outro: "Nous ne collectons <strong>pas</strong> votre nom, adresse e-mail, numéro de téléphone, position GPS précise ou toute autre information personnellement identifiable." },
                usage: { heading: "Utilisation des Informations", items: ["Afficher des publicités via Google AdMob (bannières, interstitiels, vidéos récompensées).", "Surveiller la stabilité de l'application et diagnostiquer les problèmes techniques.", "Analyser les habitudes de jeu agrégées pour améliorer les fonctionnalités futures.", "Respecter les obligations légales."] },
                advertising: { heading: "Publicité &amp; Google AdMob", text: ["Sudoku 9 utilise <strong>Google AdMob</strong> pour afficher des publicités. AdMob peut collecter et traiter des données conformément à la propre politique de confidentialité et aux conditions d'utilisation de Google.", "Lors du premier lancement, vous serez invité à consentir ou à refuser la <strong>publicité personnalisée</strong>. En cas de refus, des annonces non personnalisées (contextuelles) seront affichées. Vous pouvez modifier votre préférence à tout moment dans <strong>Paramètres → Confidentialité</strong>."], links: [{ label: "Politique de confidentialité Google", url: "https://policies.google.com/privacy" }, { label: "Désactiver les annonces personnalisées", url: "https://adssettings.google.com" }], noSell: "Nous ne vendons pas vos données personnelles à des tiers." },
                sharing: { heading: "Partage de Données &amp; Tiers", intro: "Nous ne vendons, n'échangeons ni ne louons vos informations personnelles. Des données agrégées limitées peuvent être partagées avec :", items: ["<strong>Google AdMob</strong> — pour la diffusion et la mesure des publicités.", "<strong>Autorités légales</strong> — lorsque requis par la loi applicable, une ordonnance judiciaire ou une réglementation gouvernementale."], note: "Tous les services tiers ont leur propre politique de confidentialité régissant l'utilisation de vos données." },
                children: { heading: "Confidentialité des Enfants", text: ["Sudoku 9 n'est pas destiné aux enfants de moins de <strong>13 ans</strong>. Nous ne collectons pas sciemment d'informations personnelles auprès des enfants.", "Si vous êtes parent ou tuteur et pensez que votre enfant nous a fourni des données personnelles, veuillez nous contacter à l'adresse ci-dessous et nous supprimerons rapidement ces informations.", "L'application n'utilise pas les paramètres publicitaires destinés aux enfants (COPPA) et n'est pas soumise en tant qu'application « Conçue pour les familles »."] },
                rights: { heading: "Vos Droits (RGPD &amp; Confidentialité US)", intro: "Selon votre localisation, vous pouvez avoir les droits suivants :", items: ["<strong>Accès :</strong> Demander une copie des données personnelles que nous détenons.", "<strong>Rectification :</strong> Demander la correction de données inexactes.", "<strong>Suppression :</strong> Demander l'effacement de vos données personnelles.", "<strong>Limitation :</strong> Demander la limitation de l'utilisation de vos données.", "<strong>Portabilité :</strong> Recevoir vos données dans un format structuré et lisible par machine.", "<strong>Opposition :</strong> S'opposer au traitement fondé sur un intérêt légitime.", "<strong>Retrait du consentement :</strong> Retirer votre consentement publicitaire à tout moment dans l'application."], legal: "Pour les utilisateurs UE/EEE, notre base légale pour le traitement des données publicitaires est votre <strong>consentement explicite</strong> obtenu via notre écran de consentement intégré. Pour les utilisateurs des États américains concernés (CCPA/CPRA, CDPA, CPA, etc.), vous pouvez vous opposer à tout moment via les paramètres de consentement de l'application. Contactez-nous pour exercer ces droits." },
                security: { heading: "Sécurité", text: ["Nous mettons en œuvre des mesures techniques et organisationnelles raisonnables pour protéger les données limitées que nous traitons. Cependant, aucune méthode de transmission sur Internet ou de stockage électronique n'est sécurisée à 100 %, et nous ne pouvons garantir une sécurité absolue."] },
                changes: { heading: "Modifications de Cette Politique", text: ["Nous pouvons mettre à jour cette Politique de confidentialité périodiquement. La date de « Dernière mise à jour » sera révisée en conséquence. Nous vous encourageons à consulter régulièrement cette politique.", "L'utilisation continue de Sudoku 9 après la publication de modifications constitue votre acceptation de la politique mise à jour."] },
                contact: { heading: "Nous Contacter", pre: "Pour toute question ou demande concernant cette Politique de confidentialité, veuillez contacter :", sub: "Hexlume Games &nbsp;·&nbsp; Développeur de jeux indépendant" }
            },

            /* ── ESPAÑOL ── */
            es: {
                label: "🇪🇸 Español", dir: "ltr", title: "Política de Privacidad",
                overview: { badge: "Descripción General", text: ["Hexlume Games («nosotros») desarrolló <strong>Sudoku 9</strong> como una aplicación móvil gratuita. Esta Política de privacidad explica qué información recopilamos, cómo la usamos y las opciones disponibles.", "Al descargar o usar Sudoku 9, aceptas esta política. Si no estás de acuerdo, deja de usar la aplicación."] },
                collection: { heading: "Información que Recopilamos", intro: "Recopilamos los siguientes tipos de información:", items: ["<strong>Datos del dispositivo y técnicos:</strong> Modelo, versión del SO, versión de la app, idioma y ubicación general (país/región). Recopilados automáticamente a través de nuestros socios publicitarios y de análisis.", "<strong>Datos de uso:</strong> Sesiones jugadas, niveles de dificultad seleccionados e interacciones con funciones — solo para mejorar la experiencia de juego.", "<strong>Identificadores publicitarios:</strong> Con tu consentimiento, Google AdMob puede recopilar identificadores publicitarios para mostrar anuncios personalizados.", "<strong>Progreso del juego (solo local):</strong> Tu progreso, estadísticas y configuración se almacenan exclusivamente en tu dispositivo mediante <code>localStorage</code>. No transmitimos estos datos a ningún servidor."], outro: "<strong>No</strong> recopilamos tu nombre, correo electrónico, número de teléfono, ubicación GPS precisa ni ninguna otra información de identificación personal directamente." },
                usage: { heading: "Uso de la Información", items: ["Mostrar publicidad a través de Google AdMob (banners, interstitials y videos recompensados).", "Supervisar la estabilidad de la app y diagnosticar problemas técnicos.", "Analizar patrones de juego agregados para mejorar funciones futuras.", "Cumplir con obligaciones legales."] },
                advertising: { heading: "Publicidad &amp; Google AdMob", text: ["Sudoku 9 usa <strong>Google AdMob</strong> para mostrar publicidad. AdMob puede recopilar y procesar datos según su propia Política de privacidad y Condiciones del servicio.", "En el primer inicio se te solicitará consentimiento o rechazo para la <strong>publicidad personalizada</strong>. Si rechazas, se mostrarán anuncios no personalizados. Puedes cambiar tu preferencia en cualquier momento en <strong>Ajustes → Privacidad</strong>."], links: [{ label: "Política de privacidad de Google", url: "https://policies.google.com/privacy" }, { label: "Desactivar anuncios personalizados", url: "https://adssettings.google.com" }], noSell: "No vendemos tus datos personales a terceros." },
                sharing: { heading: "Compartir Datos y Terceros", intro: "No vendemos, intercambiamos ni alquilamos tu información personal. Datos agregados limitados pueden compartirse con:", items: ["<strong>Google AdMob</strong> — para entrega y medición de anuncios.", "<strong>Autoridades legales</strong> — cuando sea necesario para cumplir con la ley aplicable, una orden judicial o regulación gubernamental."], note: "Todos los servicios de terceros tienen sus propias políticas de privacidad que rigen el uso de tus datos." },
                children: { heading: "Privacidad de los Menores", text: ["Sudoku 9 no está dirigido a menores de <strong>13 años</strong>. No recopilamos intencionalmente información personal de niños.", "Si eres padre, madre o tutor y crees que tu hijo nos ha proporcionado datos personales, contáctanos en la dirección de abajo y eliminaremos esa información de inmediato.", "La app no usa configuraciones de anuncios dirigidos a niños (COPPA) y no se ha enviado como aplicación «Diseñada para familias»."] },
                rights: { heading: "Tus Derechos (RGPD &amp; Privacidad en EE. UU.)", intro: "Dependiendo de tu ubicación, puedes tener los siguientes derechos:", items: ["<strong>Acceso:</strong> Solicitar una copia de los datos personales que tenemos sobre ti.", "<strong>Rectificación:</strong> Solicitar la corrección de datos inexactos.", "<strong>Supresión:</strong> Solicitar la eliminación de tus datos personales.", "<strong>Limitación:</strong> Solicitar que limitemos cómo usamos tus datos.", "<strong>Portabilidad:</strong> Recibir tus datos en un formato estructurado y legible por máquina.", "<strong>Oposición:</strong> Oponerte al procesamiento basado en interés legítimo.", "<strong>Retirar el consentimiento:</strong> Retirar tu consentimiento publicitario en cualquier momento desde la app."], legal: "Para usuarios de la UE/EEE, nuestra base legal es tu <strong>consentimiento explícito</strong> obtenido a través de la pantalla de consentimiento en la app. Para usuarios de estados de EE. UU. con leyes de privacidad aplicables (CCPA/CPRA, CDPA, CPA, etc.), puedes oponerte a la venta o compartición de datos en cualquier momento. Contáctanos para ejercer estos derechos." },
                security: { heading: "Seguridad", text: ["Implementamos medidas técnicas y organizativas razonables para proteger los datos limitados que procesamos. Sin embargo, ningún método de transmisión por Internet o almacenamiento electrónico es 100% seguro, y no podemos garantizar seguridad absoluta."] },
                changes: { heading: "Cambios en Esta Política", text: ["Podemos actualizar esta Política de privacidad periódicamente. Revisaremos la fecha de «Última actualización» correspondiente. Te recomendamos revisarla periódicamente.", "El uso continuado de Sudoku 9 tras la publicación de cambios constituye tu aceptación de la política actualizada."] },
                contact: { heading: "Contáctanos", pre: "Para cualquier pregunta o solicitud sobre esta Política de privacidad:", sub: "Hexlume Games &nbsp;·&nbsp; Desarrollador independiente de juegos" }
            },

            /* ── ITALIANO ── */
            it: {
                label: "🇮🇹 Italiano", dir: "ltr", title: "Informativa sulla Privacy",
                overview: { badge: "Panoramica", text: ["Hexlume Games (\"noi\") ha sviluppato <strong>Sudoku 9</strong> come applicazione mobile gratuita. Questa Informativa sulla privacy spiega quali informazioni raccogliamo, come le utilizziamo e le scelte a tua disposizione.", "Scaricando o usando Sudoku 9, accetti questa informativa. Se non sei d'accordo, ti preghiamo di smettere di usare l'app."] },
                collection: { heading: "Informazioni Raccolte", intro: "Raccogliamo i seguenti tipi di informazioni:", items: ["<strong>Dati tecnici del dispositivo:</strong> Modello, versione del sistema operativo, versione dell'app, lingua e posizione generale (paese/regione). Raccolti automaticamente tramite i nostri partner pubblicitari e analitici.", "<strong>Dati di utilizzo:</strong> Sessioni giocate, livelli di difficoltà selezionati e interazioni con le funzionalità — solo per migliorare l'esperienza di gioco.", "<strong>Identificatori pubblicitari:</strong> Con il tuo consenso, Google AdMob può raccogliere identificatori pubblicitari per mostrare annunci personalizzati.", "<strong>Progressi di gioco (solo locali):</strong> I tuoi progressi, statistiche e impostazioni sono archiviati solo sul tuo dispositivo tramite <code>localStorage</code>. Non trasmettiamo questi dati ad alcun server."], outro: "<strong>Non</strong> raccogliamo nome, e-mail, numero di telefono, posizione GPS precisa o altre informazioni identificabili direttamente." },
                usage: { heading: "Come Utilizziamo le Informazioni", items: ["Mostrare pubblicità tramite Google AdMob (banner, interstitial e video premiati).", "Monitorare la stabilità dell'app e diagnosticare problemi tecnici.", "Analizzare i modelli di gioco aggregati per migliorare le funzionalità future.", "Rispettare gli obblighi legali."] },
                advertising: { heading: "Pubblicità &amp; Google AdMob", text: ["Sudoku 9 utilizza <strong>Google AdMob</strong> per visualizzare annunci. AdMob può raccogliere ed elaborare dati in conformità con la propria Privacy Policy e Termini di servizio.", "Al primo avvio ti verrà chiesto di fornire o negare il consenso per la <strong>pubblicità personalizzata</strong>. In caso di rifiuto, verranno mostrati annunci non personalizzati. Puoi modificare la tua preferenza in qualsiasi momento in <strong>Impostazioni → Privacy</strong>."], links: [{ label: "Privacy Policy di Google", url: "https://policies.google.com/privacy" }, { label: "Disattiva annunci personalizzati", url: "https://adssettings.google.com" }], noSell: "Non vendiamo i tuoi dati personali a terzi." },
                sharing: { heading: "Condivisione Dati e Terze Parti", intro: "Non vendiamo, scambiamo né affittiamo le tue informazioni personali. Dati aggregati limitati possono essere condivisi con:", items: ["<strong>Google AdMob</strong> — per la consegna e la misurazione degli annunci.", "<strong>Autorità legali</strong> — quando richiesto dalla legge applicabile, da un'ordinanza del tribunale o da una normativa governativa."], note: "Tutti i servizi di terze parti hanno le proprie politiche sulla privacy che regolano l'uso dei tuoi dati." },
                children: { heading: "Privacy dei Minori", text: ["Sudoku 9 non è rivolto a bambini di età inferiore a <strong>13 anni</strong>. Non raccogliamo consapevolmente dati personali di minori.", "Se sei genitore o tutore e ritieni che tuo figlio ci abbia fornito dati personali, contattaci all'indirizzo sottostante e provvederemo alla cancellazione immediata.", "L'app non utilizza impostazioni pubblicitarie per bambini (COPPA) e non è stata presentata come applicazione 'Progettata per le famiglie'."] },
                rights: { heading: "I Tuoi Diritti (GDPR &amp; Privacy USA)", intro: "A seconda della tua posizione, potresti avere i seguenti diritti:", items: ["<strong>Accesso:</strong> Richiedere una copia dei dati personali che deteniamo su di te.", "<strong>Rettifica:</strong> Richiedere la correzione di dati inesatti.", "<strong>Cancellazione:</strong> Richiedere la cancellazione dei tuoi dati personali.", "<strong>Limitazione:</strong> Richiedere che limitiamo l'uso dei tuoi dati.", "<strong>Portabilità:</strong> Ricevere i tuoi dati in un formato strutturato e leggibile da macchina.", "<strong>Opposizione:</strong> Opporti al trattamento basato su legittimo interesse.", "<strong>Revoca del consenso:</strong> Revocare il tuo consenso pubblicitario in qualsiasi momento dall'app."], legal: "Per gli utenti UE/SEE, la base giuridica per il trattamento dei dati pubblicitari è il tuo <strong>consenso esplicito</strong> ottenuto tramite la nostra schermata di consenso in-app. Per gli utenti negli stati USA con leggi sulla privacy applicabili (CCPA/CPRA, CDPA, CPA, ecc.), puoi rifiutare in qualsiasi momento tramite le impostazioni di consenso dell'app. Contattaci per esercitare questi diritti." },
                security: { heading: "Sicurezza", text: ["Implementiamo misure tecniche e organizzative ragionevoli per proteggere i dati limitati che trattiamo. Tuttavia, nessun metodo di trasmissione su Internet o di archiviazione elettronica è sicuro al 100%, e non possiamo garantire la sicurezza assoluta."] },
                changes: { heading: "Modifiche a Questa Informativa", text: ["Potremmo aggiornare periodicamente questa Informativa sulla privacy. In tal caso, aggiorneremo la data dell'«Ultimo aggiornamento» in cima a questa pagina. Ti incoraggiamo a riesaminarla periodicamente.", "L'uso continuato di Sudoku 9 dopo la pubblicazione delle modifiche costituisce accettazione dell'informativa aggiornata."] },
                contact: { heading: "Contattaci", pre: "Per qualsiasi domanda o richiesta relativa a questa Informativa sulla privacy, contatta:", sub: "Hexlume Games &nbsp;·&nbsp; Sviluppatore di giochi indipendente" }
            },

            /* ── PORTUGUÊS ── */
            pt: {
                label: "🇵🇹 Português", dir: "ltr", title: "Política de Privacidade",
                overview: { badge: "Visão Geral", text: ["A Hexlume Games (\"nós\") desenvolveu o <strong>Sudoku 9</strong> como um aplicativo móvel gratuito. Esta Política de Privacidade explica quais informações coletamos, como as usamos e as opções disponíveis.", "Ao baixar ou usar o Sudoku 9, você concorda com esta política. Se não concordar, pare de usar o aplicativo."] },
                collection: { heading: "Informações Coletadas", intro: "Coletamos os seguintes tipos de informações:", items: ["<strong>Dados técnicos do dispositivo:</strong> Modelo, versão do SO, versão do app, idioma e localização geral (país/região). Coletados automaticamente por nossos parceiros de publicidade e análise.", "<strong>Dados de uso:</strong> Sessões jogadas, níveis de dificuldade selecionados e interações com recursos — apenas para melhorar a experiência de jogo.", "<strong>Identificadores de publicidade:</strong> Com seu consentimento, o Google AdMob pode coletar identificadores publicitários para veicular anúncios personalizados.", "<strong>Progresso do jogo (somente local):</strong> Seu progresso, estatísticas e configurações são armazenados apenas no seu dispositivo via <code>localStorage</code>. Não transmitimos esses dados a nenhum servidor."], outro: "<strong>Não</strong> coletamos nome, e-mail, telefone, localização GPS precisa ou qualquer outra informação de identificação pessoal diretamente." },
                usage: { heading: "Como Usamos as Informações", items: ["Exibir publicidade via Google AdMob (banners, interstitials e vídeos recompensados).", "Monitorar a estabilidade do app e diagnosticar problemas técnicos.", "Analisar padrões de jogo agregados para melhorar recursos futuros.", "Cumprir obrigações legais."] },
                advertising: { heading: "Publicidade &amp; Google AdMob", text: ["O Sudoku 9 usa o <strong>Google AdMob</strong> para exibir anúncios. O AdMob pode coletar e processar dados de acordo com sua própria Política de Privacidade e Termos de Serviço.", "No primeiro acesso, você será solicitado a consentir ou recusar a <strong>publicidade personalizada</strong>. Se recusar, serão exibidos anúncios não personalizados. Você pode alterar sua preferência a qualquer momento em <strong>Configurações → Privacidade</strong>."], links: [{ label: "Política de Privacidade do Google", url: "https://policies.google.com/privacy" }, { label: "Desativar anúncios personalizados", url: "https://adssettings.google.com" }], noSell: "Não vendemos seus dados pessoais a terceiros." },
                sharing: { heading: "Compartilhamento de Dados e Terceiros", intro: "Não vendemos, trocamos nem alugamos suas informações pessoais. Dados agregados limitados podem ser compartilhados com:", items: ["<strong>Google AdMob</strong> — para entrega e mensuração de anúncios.", "<strong>Autoridades legais</strong> — quando necessário para cumprir a lei aplicável, ordem judicial ou regulamentação governamental."], note: "Todos os serviços de terceiros possuem suas próprias políticas de privacidade que regem o uso de seus dados." },
                children: { heading: "Privacidade de Crianças", text: ["O Sudoku 9 não é direcionado a crianças menores de <strong>13 anos</strong>. Não coletamos intencionalmente informações pessoais de crianças.", "Se você é pai, mãe ou responsável e acredita que seu filho nos forneceu dados pessoais, entre em contato pelo endereço abaixo e excluiremos essas informações imediatamente.", "O app não usa configurações de anúncios para crianças (COPPA) e não foi submetido como aplicativo 'Desenvolvido para famílias'."] },
                rights: { heading: "Seus Direitos (LGPD / GDPR &amp; EUA)", intro: "Dependendo da sua localização, você pode ter os seguintes direitos:", items: ["<strong>Acesso:</strong> Solicitar uma cópia dos dados pessoais que mantemos sobre você.", "<strong>Correção:</strong> Solicitar a correção de dados incorretos.", "<strong>Exclusão:</strong> Solicitar a exclusão dos seus dados pessoais.", "<strong>Restrição:</strong> Solicitar que limitemos como usamos seus dados.", "<strong>Portabilidade:</strong> Receber seus dados em formato estruturado e legível por máquina.", "<strong>Objeção:</strong> Objetar ao processamento baseado em interesse legítimo.", "<strong>Retirar o Consentimento:</strong> Retirar seu consentimento publicitário a qualquer momento no app."], legal: "Para usuários da UE/EEE, nossa base legal é o seu <strong>consentimento explícito</strong> obtido pela tela de consentimento no app. Para usuários de estados dos EUA com leis de privacidade aplicáveis (CCPA/CPRA, CDPA, CPA, etc.), você pode optar por não ter seus dados vendidos ou compartilhados a qualquer momento pelas configurações do app. Entre em contato para exercer esses direitos." },
                security: { heading: "Segurança", text: ["Implementamos medidas técnicas e organizacionais razoáveis para proteger os dados limitados que processamos. No entanto, nenhum método de transmissão pela Internet ou armazenamento eletrônico é 100% seguro, e não podemos garantir segurança absoluta."] },
                changes: { heading: "Alterações nesta Política", text: ["Podemos atualizar esta Política de Privacidade periodicamente. A data da 'Última atualização' será revisada. Recomendamos verificá-la periodicamente.", "O uso contínuo do Sudoku 9 após a publicação das alterações constitui sua aceitação da política atualizada."] },
                contact: { heading: "Contate-nos", pre: "Para dúvidas ou solicitações sobre esta Política de Privacidade:", sub: "Hexlume Games &nbsp;·&nbsp; Desenvolvedor independente de jogos" }
            },

            /* ── РУССКИЙ ── */
            ru: {
                label: "🇷🇺 Русский", dir: "ltr", title: "Политика конфиденциальности",
                overview: { badge: "Обзор", text: ["Hexlume Games («мы») разработала <strong>Sudoku 9</strong> как бесплатное мобильное приложение. Настоящая Политика конфиденциальности объясняет, какие данные мы собираем, как их используем и каковы ваши права.", "Загружая или используя Sudoku 9, вы соглашаетесь с настоящей политикой. Если вы не согласны, прекратите использование приложения."] },
                collection: { heading: "Собираемые данные", intro: "Мы собираем следующие виды информации:", items: ["<strong>Технические данные устройства:</strong> Модель, версия ОС, версия приложения, язык и общее местоположение (страна/регион). Автоматически собираются через наших партнёров по рекламе и аналитике.", "<strong>Данные об использовании:</strong> Сыгранные сессии, выбранные уровни сложности и взаимодействие с функциями — только для улучшения игрового процесса.", "<strong>Рекламные идентификаторы:</strong> С вашего согласия Google AdMob может собирать рекламные идентификаторы для показа персонализированной рекламы.", "<strong>Прогресс игры (только локально):</strong> Ваш прогресс, статистика и настройки хранятся исключительно на вашем устройстве через <code>localStorage</code>. Мы не передаём эти данные на сервер."], outro: "Мы <strong>не</strong> собираем имена, адреса электронной почты, номера телефонов, точные GPS-координаты или другие личные идентификационные данные." },
                usage: { heading: "Использование данных", items: ["Показ рекламы через Google AdMob (баннеры, полноэкранные и вознаграждаемые видеообъявления).", "Мониторинг стабильности приложения и диагностика технических проблем.", "Анализ агрегированных игровых паттернов для улучшения функций.", "Соблюдение правовых обязательств."] },
                advertising: { heading: "Реклама и Google AdMob", text: ["Sudoku 9 использует <strong>Google AdMob</strong> для показа рекламы. AdMob может собирать и обрабатывать данные в соответствии со своей Политикой конфиденциальности и Условиями использования.", "При первом запуске вы будете спрошены о согласии или отказе от <strong>персонализированной рекламы</strong>. При отказе будут показаны неперсонализированные (контекстные) объявления. Вы можете изменить выбор в любое время в <strong>Настройки → Конфиденциальность</strong>."], links: [{ label: "Политика конфиденциальности Google", url: "https://policies.google.com/privacy" }, { label: "Отключить персонализированную рекламу", url: "https://adssettings.google.com" }], noSell: "Мы не продаём ваши персональные данные третьим сторонам." },
                sharing: { heading: "Передача данных третьим сторонам", intro: "Мы не продаём, не обмениваем и не сдаём в аренду вашу личную информацию. Ограниченные агрегированные данные могут передаваться:", items: ["<strong>Google AdMob</strong> — для доставки и измерения рекламы.", "<strong>Правовым органам</strong> — когда это требуется в соответствии с применимым законодательством, судебным решением или государственным регулированием."], note: "Все сторонние сервисы имеют собственные политики конфиденциальности, регулирующие использование ваших данных." },
                children: { heading: "Конфиденциальность детей", text: ["Sudoku 9 не предназначена для детей до <strong>13 лет</strong>. Мы не собираем намеренно личные данные детей.", "Если вы родитель или опекун и считаете, что ваш ребёнок передал нам личные данные, свяжитесь с нами по адресу ниже — мы немедленно удалим эту информацию.", "Приложение не использует настройки рекламы для детей (COPPA) и не подавалось как приложение «Для семей»."] },
                rights: { heading: "Ваши права (GDPR и законодательство США)", intro: "В зависимости от вашего местонахождения у вас могут быть следующие права:", items: ["<strong>Доступ:</strong> Запросить копию хранимых о вас данных.", "<strong>Исправление:</strong> Запросить исправление неточных данных.", "<strong>Удаление:</strong> Запросить удаление ваших персональных данных.", "<strong>Ограничение:</strong> Запросить ограничение обработки ваших данных.", "<strong>Переносимость:</strong> Получить данные в структурированном машиночитаемом формате.", "<strong>Возражение:</strong> Возразить против обработки на основе законных интересов.", "<strong>Отзыв согласия:</strong> Отозвать согласие на рекламу в любое время в приложении."], legal: "Для пользователей ЕС/ЕЭЗ правовым основанием для обработки рекламных данных является ваше <strong>явное согласие</strong>, полученное через экран согласия в приложении. Пользователи штатов США с применимыми законами о конфиденциальности (CCPA/CPRA, CDPA, CPA и др.) могут в любое время отказаться от продажи или передачи данных через настройки согласия. Свяжитесь с нами для реализации этих прав." },
                security: { heading: "Безопасность", text: ["Мы принимаем разумные технические и организационные меры для защиты ограниченного количества данных, которые мы обрабатываем. Однако ни один метод передачи данных через Интернет или электронного хранения не является на 100% безопасным, и мы не можем гарантировать абсолютную защиту."] },
                changes: { heading: "Изменения настоящей Политики", text: ["Мы можем периодически обновлять настоящую Политику конфиденциальности. При обновлении мы будем изменять дату «Последнего обновления» в верхней части страницы. Рекомендуем периодически проверять политику.", "Продолжение использования Sudoku 9 после публикации изменений означает ваше согласие с обновлённой политикой."] },
                contact: { heading: "Связаться с нами", pre: "По вопросам или запросам, связанным с настоящей Политикой конфиденциальности:", sub: "Hexlume Games &nbsp;·&nbsp; Независимый разработчик игр" }
            },

            /* ── العربية ── */
            ar: {
                label: "🇸🇦 العربية", dir: "rtl", title: "سياسة الخصوصية",
                overview: { badge: "نظرة عامة", text: ["طوّرت Hexlume Games («نحن») تطبيق <strong>Sudoku 9</strong> بوصفه تطبيقاً مجانياً للهاتف المحمول. تشرح سياسة الخصوصية هذه المعلومات التي نجمعها وكيفية استخدامها والخيارات المتاحة لك.", "بتنزيل Sudoku 9 أو استخدامه، فإنك توافق على هذه السياسة. إذا كنت لا توافق، يُرجى التوقف عن استخدام التطبيق."] },
                collection: { heading: "المعلومات التي نجمعها", intro: "نجمع الأنواع التالية من المعلومات:", items: ["<strong>البيانات التقنية للجهاز:</strong> طراز الجهاز، إصدار نظام التشغيل، إصدار التطبيق، اللغة، والموقع العام (البلد/المنطقة). تُجمع تلقائياً عبر شركاء الإعلانات والتحليلات.", "<strong>بيانات الاستخدام:</strong> الجلسات التي تم لعبها، مستويات الصعوبة المختارة، والتفاعل مع الميزات — لأغراض تحسين تجربة اللعب فقط.", "<strong>معرّفات الإعلانات:</strong> بموافقتك، قد تجمع Google AdMob معرّفات الإعلانات لعرض إعلانات مخصّصة.", "<strong>تقدّم اللعبة (محلياً فقط):</strong> يُحفظ تقدّمك وإحصاءاتك وإعداداتك على جهازك فقط عبر <code>localStorage</code>. لا نرسل هذه البيانات إلى أي خادم."], outro: "<strong>لا</strong> نجمع اسمك أو بريدك الإلكتروني أو رقم هاتفك أو موقع GPS الدقيق أو أي معلومات تعريفية شخصية أخرى." },
                usage: { heading: "كيف نستخدم المعلومات", items: ["عرض الإعلانات عبر Google AdMob (إعلانات بانر وإعلانات بينية وإعلانات فيديو مُكافِئة).", "مراقبة استقرار التطبيق وتشخيص المشكلات التقنية.", "تحليل أنماط اللعب المجمّعة لتحسين الميزات المستقبلية.", "الامتثال للالتزامات القانونية."] },
                advertising: { heading: "الإعلانات وGoogle AdMob", text: ["يستخدم Sudoku 9 منصة <strong>Google AdMob</strong> لعرض الإعلانات. قد تجمع AdMob البيانات وتعالجها وفقاً لسياسة الخصوصية والشروط الخاصة بـ Google.", "عند التشغيل الأول، ستُطلب منك الموافقة على <strong>الإعلانات المخصّصة</strong> أو رفضها. في حال الرفض، ستُعرض إعلانات غير مخصّصة. يمكنك تغيير تفضيلاتك في أي وقت من <strong>الإعدادات ← الخصوصية</strong>."], links: [{ label: "سياسة خصوصية Google", url: "https://policies.google.com/privacy" }, { label: "إيقاف الإعلانات المخصّصة", url: "https://adssettings.google.com" }], noSell: "لا نبيع بياناتك الشخصية لأي طرف ثالث." },
                sharing: { heading: "مشاركة البيانات والأطراف الثالثة", intro: "لا نبيع معلوماتك الشخصية ولا نتاجر بها ولا نؤجّرها. يمكن مشاركة بيانات مجمّعة ومحدودة مع:", items: ["<strong>Google AdMob</strong> — لتسليم الإعلانات وقياس أدائها.", "<strong>الجهات القانونية</strong> — عند الضرورة للامتثال للقانون المعمول به أو أمر قضائي أو لائحة حكومية."], note: "جميع خدمات الأطراف الثالثة لديها سياسات الخصوصية الخاصة بها التي تنظّم استخدام بياناتك." },
                children: { heading: "خصوصية الأطفال", text: ["لا يستهدف Sudoku 9 الأطفال دون سن <strong>13</strong> عاماً. لا نجمع معلومات شخصية من الأطفال عن علم.", "إذا كنت والداً أو وصياً وتعتقد أن طفلك زوّدنا ببيانات شخصية، يُرجى التواصل معنا على العنوان أدناه وسنحذف تلك المعلومات فوراً.", "لا يستخدم التطبيق إعدادات الإعلانات الموجّهة للأطفال (COPPA) ولم يُقدَّم بوصفه تطبيقاً «مصمَّماً للعائلات»."] },
                rights: { heading: "حقوقك (اللائحة العامة لحماية البيانات GDPR وقوانين الولايات الأمريكية)", intro: "بحسب موقعك، قد تتمتع بالحقوق التالية:", items: ["<strong>الوصول:</strong> طلب نسخة من البيانات الشخصية التي نحتفظ بها عنك.", "<strong>التصحيح:</strong> طلب تصحيح البيانات غير الدقيقة.", "<strong>الحذف:</strong> طلب مسح بياناتك الشخصية ('حق النسيان').", "<strong>التقييد:</strong> طلب تقييد استخدامنا لبياناتك.", "<strong>قابلية النقل:</strong> استلام بياناتك بتنسيق منظَّم وقابل للقراءة آلياً.", "<strong>الاعتراض:</strong> الاعتراض على المعالجة القائمة على المصلحة المشروعة.", "<strong>سحب الموافقة:</strong> سحب موافقتك على الإعلانات في أي وقت من التطبيق."], legal: "بالنسبة لمستخدمي الاتحاد الأوروبي، يستند أساسنا القانوني لمعالجة بيانات الإعلانات إلى <strong>موافقتك الصريحة</strong> التي نحصل عليها من خلال شاشة الموافقة في التطبيق. يمكن لمستخدمي الولايات الأمريكية ذات القوانين المعمول بها (CCPA/CPRA وCDPA وCPA وغيرها) رفض بيع بياناتهم أو مشاركتها في أي وقت. تواصل معنا لممارسة هذه الحقوق." },
                security: { heading: "الأمن", text: ["نتخذ تدابير تقنية وتنظيمية معقولة لحماية البيانات المحدودة التي نعالجها. غير أن أي طريقة لنقل البيانات عبر الإنترنت أو التخزين الإلكتروني ليست آمنة بنسبة 100%، ولا يمكننا ضمان الأمن المطلق."] },
                changes: { heading: "التغييرات على هذه السياسة", text: ["قد نُحدِّث سياسة الخصوصية هذه من وقت لآخر. عند إجراء أي تعديل، سنراجع تاريخ 'آخر تحديث' أعلى هذه الصفحة. نشجّعك على مراجعتها بصفة دورية.", "استمرارك في استخدام Sudoku 9 بعد نشر التعديلات يُعدّ موافقةً منك على السياسة المُحدَّثة."] },
                contact: { heading: "تواصل معنا", pre: "لأي استفسارات أو طلبات تتعلق بسياسة الخصوصية هذه:", sub: "Hexlume Games &nbsp;·&nbsp; مطوّر ألعاب مستقل" }
            },

            /* ── 中文 ── */
            zh: {
                label: "🇨🇳 中文", dir: "ltr", title: "隐私政策",
                overview: { badge: "概述", text: ["Hexlume Games（\"我们\"）将 <strong>Sudoku 9</strong> 开发为一款免费移动应用程序。本隐私政策说明我们收集哪些信息、如何使用以及您的选择权。", "下载或使用 Sudoku 9 即表示您同意本政策。如您不同意，请停止使用该应用。"] },
                collection: { heading: "我们收集的信息", intro: "我们收集以下类型的信息：", items: ["<strong>设备及技术数据：</strong>设备型号、操作系统版本、应用版本、语言和大致位置（国家/地区）。通过我们的广告和分析合作伙伴自动收集。", "<strong>使用数据：</strong>游戏局数、选择的难度级别及功能交互——仅用于改善游戏体验。", "<strong>广告标识符：</strong>经您同意，Google AdMob 可能收集广告标识符以投放个性化广告。", "<strong>游戏进度（仅本地）：</strong>您的谜题进度、统计数据和设置仅通过 <code>localStorage</code> 存储在您的设备上。我们不会将这些数据传输至任何服务器。"], outro: "我们<strong>不会</strong>收集您的姓名、电子邮件、电话号码、精确 GPS 位置或任何其他个人身份信息。" },
                usage: { heading: "我们如何使用信息", items: ["通过 Google AdMob 展示广告（横幅广告、插页广告和激励视频广告）。", "监控应用稳定性并通过崩溃报告诊断技术问题。", "分析汇总的游戏模式以改善未来游戏功能。", "遵守法律义务。"] },
                advertising: { heading: "广告与 Google AdMob", text: ["Sudoku 9 使用 <strong>Google AdMob</strong> 展示广告。AdMob 可能根据 Google 自己的隐私政策和服务条款收集并处理数据。", "首次启动时，将请求您同意或拒绝<strong>个性化广告</strong>。如您拒绝，将显示非个性化（情境性）广告。您可随时在<strong>设置 → 隐私</strong>中更改偏好。"], links: [{ label: "Google 隐私政策", url: "https://policies.google.com/privacy" }, { label: "退出个性化广告", url: "https://adssettings.google.com" }], noSell: "我们不向任何第三方出售您的个人数据。" },
                sharing: { heading: "数据共享与第三方", intro: "我们不出售、交换或出租您的个人信息。有限的汇总数据可能与以下方共享：", items: ["<strong>Google AdMob</strong>——用于广告投放和效果衡量。", "<strong>法律机关</strong>——在适用法律、法院命令或政府法规要求时。"], note: "所有第三方服务均有其自己的隐私政策，管理您数据的使用。" },
                children: { heading: "儿童隐私", text: ["Sudoku 9 不面向 <strong>13 岁</strong>以下儿童。我们不会故意收集儿童的个人信息。", "如您是父母或监护人，并认为您的孩子向我们提供了个人数据，请通过以下地址联系我们，我们将立即删除该信息。", "本应用不使用面向儿童的广告设置 (COPPA)，且未作为\"专为家庭设计\"的应用提交。"] },
                rights: { heading: "您的权利（GDPR 及美国各州隐私法）", intro: "根据您所在地区，您可能拥有以下权利：", items: ["<strong>访问：</strong>请求获取我们持有的您的个人数据副本。", "<strong>更正：</strong>请求更正不准确的数据。", "<strong>删除：</strong>请求删除您的个人数据（\"被遗忘权\"）。", "<strong>限制：</strong>请求限制我们使用您数据的方式。", "<strong>可携带：</strong>以结构化、机器可读格式获取您的数据。", "<strong>反对：</strong>反对基于合法利益的处理。", "<strong>撤回同意：</strong>随时在应用内撤回您的广告同意。"], legal: "对于欧盟/欧洲经济区用户，我们处理广告数据的法律依据是您通过应用内同意屏幕给予的<strong>明确同意</strong>。对于适用隐私法的美国各州用户（加州 CCPA/CPRA、弗吉尼亚州 CDPA、科罗拉多州 CPA 等），您可随时通过应用内同意设置选择退出个人信息的出售或共享。如需行使这些权利，请联系我们。" },
                security: { heading: "安全性", text: ["我们采取合理的技术和组织措施来保护我们处理的有限数据。但是，通过互联网传输或电子存储的任何方法都不能保证 100% 安全，我们无法保证绝对安全。"] },
                changes: { heading: "本政策的变更", text: ["我们可能会不时更新本隐私政策。更新时，我们将修订本页顶部的\"最后更新\"日期。我们建议您定期查阅本政策。", "更改发布后继续使用 Sudoku 9 即表示您接受更新后的政策。"] },
                contact: { heading: "联系我们", pre: "如对本隐私政策有任何问题或请求，请联系：", sub: "Hexlume Games &nbsp;·&nbsp; 独立游戏开发商" }
