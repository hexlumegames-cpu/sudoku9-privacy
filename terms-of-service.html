                sections: {
                    agreement: { badge: "Sopimus", text: ["Nämä käyttöehdot (\"Ehdot\") säätelevät <strong>Sudoku 9</strong>:n käyttöä, joka on <strong>Hexlume Games</strong>:n (\"me\", \"meidän\") kehittämä ja julkaisema mobiilisovellus. Lataamalla, asentamalla tai käyttämällä Sudoku 9:ää hyväksyt sitovasti nämä Ehdot.", "Jos et hyväksy näitä Ehtoja, älä käytä sovellusta."] },
                    s1: { heading: "1. Käyttölupa", text: ["Hexlume Games myöntää sinulle rajoitetun, ei-yksinomaisen, luovuttamattoman, peruutettavan lisenssin ladata ja käyttää Sudoku 9:ää laitteella, jonka omistat tai jota hallitset, yksinomaan henkilökohtaisiin, ei-kaupallisiin viihdetarkoituksiin.", "Et saa:"], items: ["Kopioida, muokata, sovittaa, kääntää tai luoda johdannaisteoksia sovelluksen perusteella.", "Purkaa takaisinmallinnusta, dekompiloida, disassembloida tai yrittää johtaa lähdekoodia.", "Myydä, alilisensoida, levittää tai siirtää sovellusta tai siihen liittyviä oikeuksia kolmannelle osapuolelle.", "Poistaa tai muuttaa sovelluksen omistusoikeusilmoituksia, tarroja tai merkintöjä.", "Käyttää sovellusta kaupallisiin tarkoituksiin ilman ennakkolupaamme."] },
                    s2: { heading: "2. Immateriaalioikeudet", text: ["Sudoku 9 ja kaikki sen sisältö — mukaan lukien, mutta ei rajoittuen, grafiikka, äänet, koodi, pelimekaniikat, kauppatapa ja Hexlume Games -brändi — ovat Hexlume Gamesin tai sen lisensoijien yksinomaisuutta, ja niitä suojataan soveltuvilla immateriaalioikeuslaeilla.", "Sudokun matemaattiset perussäännöt ovat yleistä aluetta. Toteutuksemme, grafiikka, ääni ja ohjelmisto ovat omistusoikeudellisia."] },
                    s3: { heading: "3. Sovelluksen sisäiset mainokset", text: ["Sudoku 9 on ilmainen, ja sitä tukevat <strong>Google AdMob</strong>:n tarjoamat mainokset. Käyttämällä sovellusta hyväksyt mainosten näyttämisen, jotka voivat sisältää bannereita, interstitiaaleja ja palkittuja videomainoksia.", "Voit valita ensikäynnistyksen suostumusnäytön tai sovelluksen asetusvalikon kautta, haluatko vastaanottaa henkilökohtaisia vai ei-henkilökohtaisia mainoksia. Henkilökohtaisten mainosten suostumuksen peruuttaminen ei poista mainoksia sovelluksesta."] },
                    s4: { heading: "4. Käyttäjän toiminta", text: ["Sitoudut olemaan käyttämättä Sudoku 9:ää seuraaviin tarkoituksiin:"], items: ["Sovelluksen eheyden tai suorituskyvyn häiritseminen.", "Yrittää saada luvaton pääsy mihinkään osaan sovellusta tai siihen liittyviin järjestelmiin.", "Automaattisten komentosarjojen, bottien tai huijausohjelmistojen käyttäminen pelitietojen manipuloimiseksi.", "Minkään sovellettavan paikallisen, kansallisen tai kansainvälisen lain tai asetuksen rikkominen."], note: "Pidätämme oikeuden lopettaa pääsysi sovellukseen näiden sääntöjen rikkomisen vuoksi." },
                    s5: { heading: "5. Yksityisyys", text: ["Sudoku 9:n käyttöösi sovelletaan myös <a href=\"privacy-policy.html\">tietosuojakäytäntöämme</a>, joka on sisällytetty näihin Ehtoihin viitteellisesti. Lue se huolellisesti ymmärtääksesi käytäntömme."] },
                    s6: { heading: "6. Vastuuvapauslausekkeet ja takuu", text: ["Sudoku 9 tarjotaan <strong>\"sellaisenaan\"</strong> ja <strong>\"sellaisena kuin se on saatavilla\"</strong> ilman minkäänlaista nimenomaista tai oletettua takuuta, mukaan lukien, mutta ei rajoittuen, takuut kaupallisesta kelpoisuudesta, sopivuudesta tiettyyn tarkoitukseen tai oikeuksien loukkaamattomuudesta.", "Emme takaa, että sovellus toimii keskeytyksettä, on virheetön, turvallinen tai vapaa viruksista tai muista haitallisista komponenteista. Emme takaa minkään sisällön oikeellisuutta, luotettavuutta tai täydellisyyttä."] },
                    s7: { heading: "7. Vastuun rajoittaminen", text: ["Sovellettavan lain sallimassa laajuudessa Hexlume Games ja sen omistajat, tytäryhtiöt, työntekijät ja edustajat eivät ole vastuussa mistään välillisistä, satunnaisista, erityisistä, välillisistä, rangaistusluonteisista tai esimerkillisistä vahingoista — mukaan lukien, mutta ei rajoittuen, tietojen menetys, voitonmenetys tai liikearvon menetys — jotka johtuvat Sudoku 9:n käytöstäsi (tai käyttökyvyttömyydestä) tai liittyvät siihen.", "Kokonaisvastuumme sinulle näistä Ehdoista tai sovelluksen käytöstä johtuvista vaatimuksista ei ylitä määrää, jonka olet maksanut (jos olet maksanut) Hexlume Gamesille vaatimusta edeltäneiden kahdentoista kuukauden aikana."] },
                    s8: { heading: "8. Päivitykset ja muutokset", text: ["Voimme milloin tahansa ilman ennakkoilmoitusta päivittää, muokata tai lopettaa Sudoku 9:n (tai minkä tahansa osan siitä). Voimme myös milloin tahansa päivittää näitä Ehtoja julkaisemalla tarkistetun version tällä sivulla uudella \"Viimeksi päivitetty\" -päivämäärällä.", "Sovelluksen jatkuva käyttösi muutosten julkaisemisen jälkeen merkitsee päivitettyjen Ehtojen hyväksymistä. Jos et ole samaa mieltä muutoksista, sinun on lopetettava sovelluksen käyttö."] },
                    s9: { heading: "9. Päättäminen", text: ["Nämä Ehdot pysyvät voimassa, kunnes ne päätetään. Oikeutesi näiden Ehtojen mukaisesti päättyvät automaattisesti ilman ilmoitusta meiltä, jos et noudata jotakin ehtoa. Päättämisen jälkeen sinun on lopetettava sovelluksen kaikki käyttö ja poistettava kaikki hallussasi olevat kopiot.", "Pidätämme oikeuden päättää tai keskeyttää pääsy Sudoku 9:ään harkintamme mukaan ilman ennakkoilmoitusta toiminnasta, jonka katsomme rikkovan näitä Ehtoja tai olevan haitallista muille käyttäjille, meille tai kolmansille osapuolille."] },
                    s10: { heading: "10. Sovellettava laki", text: ["Näihin Ehtoihin sovelletaan <strong>Turkin</strong> lakeja, ja niitä tulkitaan niiden mukaisesti, ottamatta huomioon sen lainvalintamääräyksiä. Kaikki näistä Ehdoista johtuvat riidat kuuluvat Turkin toimivaltaisten tuomioistuinten yksinomaisen toimivallan piiriin.", "Jos olet kuluttaja Euroopan unionissa, voit myös hyötyä asuinmaasi lain pakottavista suojaavista säännöksistä."] },
                    s11: { heading: "11. Jakautuvuus", text: ["Jos jotakin näiden Ehtojen määräystä pidetään sovellettavan lain mukaan pätemättömänä, laittomana tai täytäntöönpanokelvottomana, tätä määräystä muutetaan siinä vähimmäismäärin, joka on tarpeen sen täytäntöönpanokelpoiseksi tekemiseksi, ja jäljellä olevat määräykset pysyvät täysin voimassa."] },
                    s12: { heading: "12. Koko sopimus", text: ["Nämä Ehdot yhdessä <a href=\"privacy-policy.html\">tietosuojakäytäntömme</a> kanssa muodostavat koko sopimuksen sinun ja Hexlume Gamesin välillä Sudoku 9:stä ja korvaavat kaikki aiemmat tai samanaikaiset sopimukset, lausumat tai yhteisymmärrykset."] },
                    contact: { heading: "Ota yhteyttä", pre: "Kysymyksiä näistä Ehdoista? Ota meihin yhteyttä:", sub: "Hexlume Games &nbsp;·&nbsp; Itsenäinen pelikehittäjä" }
                }
            },
            id: {
                label: "🇮🇩 Indonesia", dir: "ltr", title: "Ketentuan Layanan",
                sections: {
                    agreement: { badge: "Perjanjian", text: ["Ketentuan Layanan ini (\"Ketentuan\") mengatur penggunaan Anda atas <strong>Sudoku 9</strong>, aplikasi seluler yang dikembangkan dan diterbitkan oleh <strong>Hexlume Games</strong> (\"kami\", \"kita\", \"milik kami\"). Dengan mengunduh, memasang, atau menggunakan Sudoku 9, Anda setuju untuk terikat oleh Ketentuan ini.", "Jika Anda tidak setuju dengan Ketentuan ini, jangan gunakan aplikasi."] },
                    s1: { heading: "1. Lisensi Penggunaan", text: ["Hexlume Games memberi Anda lisensi terbatas, tidak eksklusif, tidak dapat dialihkan, dan dapat dibatalkan untuk mengunduh dan menggunakan Sudoku 9 pada perangkat yang Anda miliki atau kendalikan, semata-mata untuk tujuan hiburan pribadi non-komersial Anda.", "Anda tidak boleh:"], items: ["Menyalin, memodifikasi, mengadaptasi, menerjemahkan, atau membuat karya turunan berdasarkan aplikasi.", "Melakukan rekayasa balik, dekompilasi, disassembly, atau mencoba mendapatkan kode sumber.", "Menjual, mensublisensikan, mendistribusikan, atau mentransfer aplikasi atau hak apa pun di dalamnya kepada pihak ketiga mana pun.", "Menghapus atau mengubah pemberitahuan kepemilikan, label, atau tanda pada aplikasi.", "Menggunakan aplikasi untuk tujuan komersial apa pun tanpa persetujuan tertulis sebelumnya dari kami."] },
                    s2: { heading: "2. Kekayaan Intelektual", text: ["Sudoku 9 dan semua kontennya — termasuk namun tidak terbatas pada grafik, suara, kode, mekanika permainan, tampilan dagang, dan merek Hexlume Games — adalah milik eksklusif Hexlume Games atau pemberi lisensinya dan dilindungi oleh undang-undang kekayaan intelektual yang berlaku.", "Aturan matematika standar Sudoku berada di domain publik. Implementasi, karya seni, audio, dan perangkat lunak kami adalah milik kami."] },
                    s3: { heading: "3. Iklan Dalam Aplikasi", text: ["Sudoku 9 gratis untuk dimainkan dan didukung oleh iklan yang disediakan oleh <strong>Google AdMob</strong>. Dengan menggunakan aplikasi, Anda menyetujui tampilan iklan, yang dapat mencakup iklan spanduk, iklan interstisial, dan video berhadiah.", "Anda dapat memilih apakah akan menerima iklan yang dipersonalisasi atau tidak dipersonalisasi melalui layar persetujuan pada peluncuran pertama, atau kapan saja melalui menu Pengaturan aplikasi. Menarik persetujuan untuk iklan yang dipersonalisasi tidak menghapus iklan dari aplikasi."] },
                    s4: { heading: "4. Perilaku Pengguna", text: ["Anda setuju untuk tidak menggunakan Sudoku 9 untuk:"], items: ["Mengganggu atau mengganggu integritas atau kinerja aplikasi.", "Mencoba mendapatkan akses tidak sah ke bagian mana pun dari aplikasi atau sistem terkait.", "Menggunakan skrip otomatis, bot, atau perangkat lunak curang untuk memanipulasi data permainan.", "Melanggar hukum atau peraturan lokal, nasional, atau internasional yang berlaku."], note: "Kami berhak menghentikan akses Anda ke aplikasi karena pelanggaran aturan ini." },
                    s5: { heading: "5. Privasi", text: ["Penggunaan Anda atas Sudoku 9 juga diatur oleh <a href=\"privacy-policy.html\">Kebijakan Privasi</a> kami, yang dimasukkan ke dalam Ketentuan ini dengan referensi. Harap tinjau dengan saksama untuk memahami praktik kami."] },
                    s6: { heading: "6. Penyangkalan dan Jaminan", text: ["Sudoku 9 disediakan <strong>\"sebagaimana adanya\"</strong> dan <strong>\"sesuai ketersediaan\"</strong> tanpa jaminan apa pun, tersurat maupun tersirat, termasuk namun tidak terbatas pada jaminan kelayakan untuk diperdagangkan, kesesuaian untuk tujuan tertentu, atau tidak melanggar hak pihak lain.", "Kami tidak menjamin bahwa aplikasi akan berjalan tanpa gangguan, bebas kesalahan, aman, atau bebas dari virus atau komponen berbahaya lainnya. Kami tidak memberikan jaminan mengenai keakuratan, keandalan, atau kelengkapan konten apa pun."] },
                    s7: { heading: "7. Batasan Tanggung Jawab", text: ["Sejauh diizinkan oleh hukum yang berlaku, Hexlume Games dan pemilik, afiliasi, karyawan, serta agennya tidak bertanggung jawab atas kerugian tidak langsung, insidental, khusus, konsekuensial, hukuman, atau contoh — termasuk namun tidak terbatas pada kehilangan data, kehilangan keuntungan, atau kehilangan niat baik — yang timbul dari atau sehubungan dengan penggunaan Anda (atau ketidakmampuan menggunakan) Sudoku 9.", "Total tanggung jawab kumulatif kami kepada Anda untuk klaim apa pun yang timbul dari Ketentuan ini atau penggunaan Anda atas aplikasi tidak akan melebihi jumlah yang telah Anda bayarkan (jika ada) kepada Hexlume Games dalam dua belas bulan sebelum klaim."] },
                    s8: { heading: "8. Pembaruan dan Modifikasi", text: ["Kami dapat memperbarui, memodifikasi, atau menghentikan Sudoku 9 (atau bagian mana pun darinya) sewaktu-waktu tanpa pemberitahuan. Kami juga dapat memperbarui Ketentuan ini sewaktu-waktu dengan memposting versi revisi di halaman ini dengan tanggal \"Terakhir Diperbarui\" yang baru.", "Penggunaan aplikasi Anda yang berkelanjutan setelah perubahan diposting merupakan penerimaan Anda atas Ketentuan yang diperbarui. Jika Anda tidak setuju dengan perubahan apa pun, Anda harus berhenti menggunakan aplikasi."] },
                    s9: { heading: "9. Penghentian", text: ["Ketentuan ini tetap berlaku sampai dihentikan. Hak Anda berdasarkan Ketentuan ini akan berakhir secara otomatis tanpa pemberitahuan dari kami jika Anda gagal mematuhi ketentuan apa pun. Setelah penghentian, Anda harus menghentikan semua penggunaan aplikasi dan menghapus semua salinan yang ada di tangan Anda.", "Kami berhak untuk menghentikan atau menangguhkan akses ke Sudoku 9 atas kebijakan kami sendiri, tanpa pemberitahuan sebelumnya, atas perilaku yang kami yakini melanggar Ketentuan ini atau merugikan pengguna lain, kami, atau pihak ketiga."] },
                    s10: { heading: "10. Hukum yang Berlaku", text: ["Ketentuan ini akan diatur dan ditafsirkan sesuai dengan hukum <strong>Turki</strong>, tanpa memperhatikan ketentuan konflik hukumnya. Setiap perselisihan yang timbul dari Ketentuan ini akan tunduk pada yurisdiksi eksklusif pengadilan yang berwenang di Turki.", "Jika Anda adalah konsumen di Uni Eropa, Anda juga dapat memperoleh manfaat dari ketentuan perlindungan wajib dari hukum negara tempat Anda tinggal."] },
                    s11: { heading: "11. Dapat Dipisahkan", text: ["Jika ada ketentuan dalam Ketentuan ini yang dinyatakan tidak sah, ilegal, atau tidak dapat ditegakkan berdasarkan hukum yang berlaku, ketentuan tersebut akan dimodifikasi seminimal mungkin untuk membuatnya dapat ditegakkan, dan ketentuan lainnya akan tetap berlaku penuh."] },
                    s12: { heading: "12. Keseluruhan Perjanjian", text: ["Ketentuan ini, bersama dengan <a href=\"privacy-policy.html\">Kebijakan Privasi</a> kami, merupakan keseluruhan perjanjian antara Anda dan Hexlume Games mengenai Sudoku 9 dan menggantikan semua perjanjian, pernyataan, atau pemahaman sebelumnya atau yang sewaktu."] },
                    contact: { heading: "Hubungi Kami", pre: "Pertanyaan tentang Ketentuan ini? Hubungi kami di:", sub: "Hexlume Games &nbsp;·&nbsp; Pengembang Game Independen" }
                }
            },
            vi: {
                label: "🇻🇳 Tiếng Việt", dir: "ltr", title: "Điều khoản dịch vụ",
                sections: {
                    agreement: { badge: "Thỏa thuận", text: ["Các Điều khoản Dịch vụ này (\"Điều khoản\") điều chỉnh việc bạn sử dụng <strong>Sudoku 9</strong>, một ứng dụng di động được phát triển và xuất bản bởi <strong>Hexlume Games</strong> (\"chúng tôi\", \"của chúng tôi\"). Bằng cách tải xuống, cài đặt hoặc sử dụng Sudoku 9, bạn đồng ý bị ràng buộc bởi các Điều khoản này.", "Nếu bạn không đồng ý với các Điều khoản này, đừng sử dụng ứng dụng."] },
                    s1: { heading: "1. Giấy phép sử dụng", text: ["Hexlume Games cấp cho bạn giấy phép có giới hạn, không độc quyền, không thể chuyển nhượng, có thể thu hồi để tải xuống và sử dụng Sudoku 9 trên thiết bị bạn sở hữu hoặc kiểm soát, chỉ dành cho mục đích giải trí cá nhân phi thương mại của bạn.", "Bạn không được:"], items: ["Sao chép, sửa đổi, điều chỉnh, dịch hoặc tạo các tác phẩm phái sinh dựa trên ứng dụng.", "Thực hiện kỹ thuật đảo ngược, dịch ngược, tháo ngược hoặc cố gắng lấy mã nguồn.", "Bán, cấp phép lại, phân phối hoặc chuyển giao ứng dụng hoặc bất kỳ quyền nào trong đó cho bất kỳ bên thứ ba nào.", "Xóa hoặc thay đổi bất kỳ thông báo độc quyền, nhãn hoặc dấu hiệu nào trên ứng dụng.", "Sử dụng ứng dụng cho bất kỳ mục đích thương mại nào mà không có sự đồng ý trước bằng văn bản của chúng tôi."] },
                    s2: { heading: "2. Sở hữu trí tuệ", text: ["Sudoku 9 và tất cả nội dung của nó — bao gồm nhưng không giới hạn ở đồ họa, âm thanh, mã, cơ chế trò chơi, hình thức thương mại và thương hiệu Hexlume Games — là tài sản độc quyền của Hexlume Games hoặc bên cấp phép của họ và được bảo vệ bởi luật sở hữu trí tuệ hiện hành.", "Các quy tắc toán học tiêu chuẩn của Sudoku thuộc phạm vi công cộng. Việc triển khai, tác phẩm nghệ thuật, âm thanh và phần mềm của chúng tôi là độc quyền."] },
                    s3: { heading: "3. Quảng cáo trong ứng dụng", text: ["Sudoku 9 miễn phí để chơi và được hỗ trợ bởi quảng cáo do <strong>Google AdMob</strong> cung cấp. Bằng cách sử dụng ứng dụng, bạn đồng ý với việc hiển thị quảng cáo, có thể bao gồm quảng cáo biểu ngữ, quảng cáo xen kẽ và quảng cáo video có thưởng.", "Bạn có thể chọn nhận quảng cáo được cá nhân hóa hay không được cá nhân hóa thông qua màn hình đồng ý khi khởi chạy lần đầu hoặc bất kỳ lúc nào thông qua menu Cài đặt của ứng dụng. Rút lại sự đồng ý đối với quảng cáo được cá nhân hóa không xóa quảng cáo khỏi ứng dụng."] },
                    s4: { heading: "4. Hành vi của người dùng", text: ["Bạn đồng ý không sử dụng Sudoku 9 để:"], items: ["Can thiệp vào hoặc phá vỡ tính toàn vẹn hoặc hiệu suất của ứng dụng.", "Cố gắng giành quyền truy cập trái phép vào bất kỳ phần nào của ứng dụng hoặc hệ thống liên quan.", "Sử dụng tập lệnh tự động, bot hoặc phần mềm gian lận để thao túng dữ liệu trò chơi.", "Vi phạm bất kỳ luật hoặc quy định địa phương, quốc gia hoặc quốc tế hiện hành nào."], note: "Chúng tôi có quyền chấm dứt quyền truy cập của bạn vào ứng dụng nếu vi phạm các quy tắc này." },
                    s5: { heading: "5. Quyền riêng tư", text: ["Việc bạn sử dụng Sudoku 9 cũng được điều chỉnh bởi <a href=\"privacy-policy.html\">Chính sách quyền riêng tư</a> của chúng tôi, được đưa vào các Điều khoản này bằng cách tham chiếu. Vui lòng xem xét cẩn thận để hiểu các thông lệ của chúng tôi."] },
                    s6: { heading: "6. Tuyên bố từ chối trách nhiệm và bảo hành", text: ["Sudoku 9 được cung cấp <strong>\"nguyên trạng\"</strong> và <strong>\"theo tình trạng sẵn có\"</strong> mà không có bất kỳ bảo hành nào dưới bất kỳ hình thức nào, dù rõ ràng hay ngụ ý, bao gồm nhưng không giới hạn ở bảo hành về khả năng thương mại, sự phù hợp cho một mục đích cụ thể hoặc không vi phạm.", "Chúng tôi không đảm bảo rằng ứng dụng sẽ không bị gián đoạn, không có lỗi, an toàn hoặc không có vi-rút hoặc các thành phần độc hại khác. Chúng tôi không bảo hành về tính chính xác, độ tin cậy hoặc tính đầy đủ của bất kỳ nội dung nào."] },
                    s7: { heading: "7. Giới hạn trách nhiệm", text: ["Trong phạm vi tối đa được pháp luật hiện hành cho phép, Hexlume Games và chủ sở hữu, chi nhánh, nhân viên và đại lý của họ sẽ không chịu trách nhiệm về bất kỳ thiệt hại gián tiếp, ngẫu nhiên, đặc biệt, do hậu quả, trừng phạt hoặc làm gương — bao gồm nhưng không giới hạn ở mất dữ liệu, mất lợi nhuận hoặc mất uy tín — phát sinh từ hoặc liên quan đến việc bạn sử dụng (hoặc không thể sử dụng) Sudoku 9.", "Tổng trách nhiệm tích lũy của chúng tôi đối với bạn đối với bất kỳ khiếu nại nào phát sinh từ các Điều khoản này hoặc việc bạn sử dụng ứng dụng sẽ không vượt quá số tiền bạn đã trả (nếu có) cho Hexlume Games trong mười hai tháng trước khi khiếu nại."] },
                    s8: { heading: "8. Cập nhật và sửa đổi", text: ["Chúng tôi có thể cập nhật, sửa đổi hoặc ngừng cung cấp Sudoku 9 (hoặc bất kỳ phần nào của nó) bất kỳ lúc nào mà không cần thông báo. Chúng tôi cũng có thể cập nhật các Điều khoản này bất kỳ lúc nào bằng cách đăng phiên bản sửa đổi trên trang này với ngày \"Cập nhật lần cuối\" mới.", "Việc bạn tiếp tục sử dụng ứng dụng sau khi các thay đổi được đăng tải cấu thành sự chấp nhận của bạn đối với các Điều khoản đã cập nhật. Nếu bạn không đồng ý với bất kỳ thay đổi nào, bạn phải ngừng sử dụng ứng dụng."] },
                    s9: { heading: "9. Chấm dứt", text: ["Các Điều khoản này vẫn có hiệu lực cho đến khi bị chấm dứt. Quyền của bạn theo các Điều khoản này sẽ tự động chấm dứt mà không cần thông báo từ chúng tôi nếu bạn không tuân thủ bất kỳ điều khoản nào. Khi chấm dứt, bạn phải ngừng mọi sử dụng ứng dụng và xóa tất cả các bản sao trong tay bạn.", "Chúng tôi có quyền chấm dứt hoặc tạm ngừng quyền truy cập vào Sudoku 9 theo quyết định riêng của chúng tôi, mà không cần thông báo trước, đối với hành vi mà chúng tôi cho là vi phạm các Điều khoản này hoặc gây hại cho người dùng khác, chúng tôi hoặc bên thứ ba."] },
                    s10: { heading: "10. Luật điều chỉnh", text: ["Các Điều khoản này sẽ được điều chỉnh và giải thích theo luật của <strong>Thổ Nhĩ Kỳ</strong>, không phân biệt các điều khoản về xung đột luật của nước này. Bất kỳ tranh chấp nào phát sinh từ các Điều khoản này sẽ phải tuân theo quyền tài phán độc quyền của các tòa án có thẩm quyền của Thổ Nhĩ Kỳ.", "Nếu bạn là người tiêu dùng ở Liên minh Châu Âu, bạn cũng có thể được hưởng lợi từ bất kỳ điều khoản bảo vệ bắt buộc nào của pháp luật nước bạn cư trú."] },
                    s11: { heading: "11. Tính khả thi", text: ["Nếu bất kỳ điều khoản nào của Điều khoản này bị coi là vô hiệu, bất hợp pháp hoặc không thể thi hành theo luật hiện hành, điều khoản đó sẽ được sửa đổi ở mức tối thiểu cần thiết để làm cho nó có thể thi hành được, và các điều khoản còn lại sẽ tiếp tục có hiệu lực đầy đủ."] },
                    s12: { heading: "12. Toàn bộ thỏa thuận", text: ["Các Điều khoản này, cùng với <a href=\"privacy-policy.html\">Chính sách quyền riêng tư</a> của chúng tôi, cấu thành toàn bộ thỏa thuận giữa bạn và Hexlume Games liên quan đến Sudoku 9 và thay thế tất cả các thỏa thuận, tuyên bố hoặc hiểu biết trước đó hoặc cùng thời."] },
                    contact: { heading: "Liên hệ chúng tôi", pre: "Câu hỏi về các Điều khoản này? Liên hệ với chúng tôi tại:", sub: "Hexlume Games &nbsp;·&nbsp; Nhà phát triển game độc lập" }
                }
            },
            th: {
                label: "🇹🇭 ภาษาไทย", dir: "ltr", title: "ข้อกำหนดการให้บริการ",
                sections: {
                    agreement: { badge: "ข้อตกลง", text: ["ข้อกำหนดการให้บริการเหล่านี้ (\"ข้อกำหนด\") ควบคุมการใช้งาน <strong>Sudoku 9</strong> ของคุณ ซึ่งเป็นแอปพลิเคชันมือถือที่พัฒนาและเผยแพร่โดย <strong>Hexlume Games</strong> (\"เรา\", \"ของเรา\") การดาวน์โหลด ติดตั้ง หรือใช้ Sudoku 9 แสดงว่าคุณตกลงที่จะผูกพันตามข้อกำหนดเหล่านี้", "หากคุณไม่เห็นด้วยกับข้อกำหนดเหล่านี้ ห้ามใช้แอปพลิเคชัน"] },
                    s1: { heading: "1. สิทธิ์การใช้งาน", text: ["Hexlume Games ให้สิทธิ์แบบจำกัด ไม่ผูกขาด โอนไม่ได้ และเพิกถอนได้แก่คุณในการดาวน์โหลดและใช้ Sudoku 9 บนอุปกรณ์ที่คุณเป็นเจ้าของหรือควบคุม เพื่อวัตถุประสงค์ด้านความบันเทิงส่วนตัวที่ไม่ใช่เชิงพาณิชย์เท่านั้น", "คุณไม่ได้รับอนุญาตให้:"], items: ["คัดลอก แก้ไข ดัดแปลง แปล หรือสร้างงานดัดแปลงจากแอป", "ทำวิศวกรรมย้อนกลับ ถอดรหัส แยกชิ้นส่วน หรือพยายามหารหัสต้นฉบับ", "ขาย อนุญาตช่วง แจกจ่าย หรือโอนแอปหรือสิทธิ์ใดๆ ในแอปให้แก่บุคคลที่สาม", "ลบหรือแก้ไขประกาศสิทธิ์ ฉลาก หรือเครื่องหมายใดๆ บนแอป", "ใช้แอปเพื่อวัตถุประสงค์ทางการค้าใดๆ โดยไม่ได้รับความยินยอมเป็นลายลักษณ์อักษรล่วงหน้าจากเรา"] },
                    s2: { heading: "2. ทรัพย์สินทางปัญญา", text: ["Sudoku 9 และเนื้อหาทั้งหมด — รวมถึงแต่ไม่จำกัดเพียง กราฟิก เสียง โค้ด กลไกเกม ภาพลักษณ์ทางการค้า และแบรนด์ Hexlume Games — เป็นทรัพย์สินแต่เพียงผู้เดียวของ Hexlume Games หรือผู้ให้อนุญาต และได้รับการคุ้มครองโดยกฎหมายทรัพย์สินทางปัญญาที่เกี่ยวข้อง", "กฎทางคณิตศาสตร์มาตรฐานของซูโดกุเป็นสาธารณสมบัติ การดำเนินการ งานศิลป์ เสียง และซอฟต์แวร์ของเราเป็นกรรมสิทธิ์ของเรา"] },
                    s3: { heading: "3. การโฆษณาในแอป", text: ["Sudoku 9 เล่นฟรีและสนับสนุนโดยโฆษณาจาก <strong>Google AdMob</strong> การใช้แอปแสดงว่าคุณยินยอมให้แสดงโฆษณา ซึ่งอาจรวมถึงโฆษณาแบนเนอร์ โฆษณาแทรก และวิดีโอโฆษณาพร้อมรางวัล", "คุณสามารถเลือกรับโฆษณาแบบส่วนบุคคลหรือไม่ส่วนบุคคลผ่านหน้าจอความยินยอมเมื่อเปิดใช้ครั้งแรก หรือผ่านเมนูการตั้งค่าของแอปได้ตลอดเวลา การเพิกถอนความยินยอมสำหรับโฆษณาส่วนบุคคลจะไม่ลบโฆษณาออกจากแอป"] },
                    s4: { heading: "4. พฤติกรรมผู้ใช้", text: ["คุณตกลงที่จะไม่ใช้ Sudoku 9 เพื่อ:"], items: ["รบกวนหรือทำลายความสมบูรณ์หรือประสิทธิภาพของแอป", "พยายามเข้าถึงส่วนใดส่วนหนึ่งของแอปหรือระบบที่เกี่ยวข้องโดยไม่ได้รับอนุญาต", "ใช้สคริปต์อัตโนมัติ บอท หรือซอฟต์แวร์โกงเพื่อจัดการข้อมูลเกม", "ละเมิดกฎหมายหรือข้อบังคับท้องถิ่น ระดับชาติ หรือระหว่างประเทศที่เกี่ยวข้อง"], note: "เราขอสงวนสิทธิ์ในการยุติการเข้าถึงแอปของคุณหากละเมิดกฎเหล่านี้" },
                    s5: { heading: "5. ความเป็นส่วนตัว", text: ["การใช้งาน Sudoku 9 ของคุณอยู่ภายใต้ <a href=\"privacy-policy.html\">นโยบายความเป็นส่วนตัว</a> ของเราซึ่งรวมเข้าเป็นส่วนหนึ่งของข้อกำหนดนี้โดยการอ้างอิง โปรดตรวจสอบอย่างละเอียดเพื่อทำความเข้าใจแนวปฏิบัติของเรา"] },
                    s6: { heading: "6. การปฏิเสธความรับผิดและการรับประกัน", text: ["Sudoku 9 ให้บริการ <strong>\"ตามที่เป็น\"</strong> และ <strong>\"ตามที่มีให้\"</strong> โดยไม่มีการรับประกันใดๆ ไม่ว่าโดยชัดแจ้งหรือโดยนัย รวมถึงแต่ไม่จำกัดเพียงการรับประกันเกี่ยวกับความสามารถในการขาย ความเหมาะสมสำหรับวัตถุประสงค์เฉพาะ หรือการไม่ละเมิดสิทธิ์", "เราไม่รับประกันว่าแอปจะทำงานต่อเนื่อง ปราศจากข้อผิดพลาด ปลอดภัย หรือปราศจากไวรัสหรือส่วนประกอบที่เป็นอันตรายอื่นๆ เราไม่รับประกันความถูกต้อง เชื่อถือได้ หรือความสมบูรณ์ของเนื้อหาใดๆ"] },
                    s7: { heading: "7. การจำกัดความรับผิด", text: ["เท่าที่กฎหมายที่เกี่ยวข้องอนุญาตสูงสุด Hexlume Games และเจ้าของ บริษัทในเครือ พนักงาน และตัวแทนของบริษัทจะไม่รับผิดชอบต่อความเสียหายทางอ้อม อุบัติเหตุ พิเศษ เป็นผล ลงโทษ หรือเป็นเยี่ยงอย่าง — รวมถึงแต่ไม่จำกัดเพียงการสูญเสียข้อมูล การสูญเสียผลกำไร หรือการสูญเสียชื่อเสียง — ที่เกิดขึ้นจากหรือเกี่ยวข้องกับการใช้ (หรือไม่สามารถใช้) Sudoku 9 ของคุณ", "ความรับผิดสะสมทั้งหมดของเราที่มีต่อคุณสำหรับการเรียกร้องใดๆ ที่เกิดขึ้นจากข้อกำหนดนี้หรือการใช้แอปของคุณจะต้องไม่เกินจำนวนเงินที่คุณชำระ (หากมี) ให้แก่ Hexlume Games ในช่วงสิบสองเดือนก่อนการเรียกร้อง"] },
                    s8: { heading: "8. การอัปเดตและการแก้ไข", text: ["เราอาจอัปเดต แก้ไข หรือยุติ Sudoku 9 (หรือบางส่วน) ได้ตลอดเวลาโดยไม่ต้องแจ้งให้ทราบล่วงหน้า เราอาจอัปเดตข้อกำหนดนี้ได้ตลอดเวลาโดยการโพสต์เวอร์ชันที่แก้ไขในหน้านี้พร้อมวันที่ \"อัปเดตล่าสุด\" ใหม่", "การที่คุณใช้แอปต่อไปหลังจากการเผยแพร่การเปลี่ยนแปลงถือเป็นการยอมรับข้อกำหนดที่อัปเดตแล้ว หากคุณไม่เห็นด้วยกับการเปลี่ยนแปลงใดๆ คุณต้องหยุดใช้แอป"] },
                    s9: { heading: "9. การสิ้นสุด", text: ["ข้อกำหนดนี้ยังคงมีผลจนกว่าจะสิ้นสุด สิทธิ์ของคุณภายใต้ข้อกำหนดนี้จะสิ้นสุดลงโดยอัตโนมัติโดยไม่ต้องแจ้งให้เราทราบหากคุณไม่ปฏิบัติตามเงื่อนไขใดๆ เมื่อสิ้นสุด คุณต้องหยุดใช้แอปทั้งหมดและลบสำเนาทั้งหมดที่อยู่ในครอบครองของคุณ", "เราขอสงวนสิทธิ์ในการยุติหรือระงับการเข้าถึง Sudoku 9 ตามดุลยพินิจแต่เพียงผู้เดียวของเรา โดยไม่ต้องแจ้งให้ทราบล่วงหน้า สำหรับการกระทำที่เราเชื่อว่าละเมิดข้อกำหนดนี้หรือเป็นอันตรายต่อผู้ใช้รายอื่น เราหรือบุคคลที่สาม"] },
                    s10: { heading: "10. กฎหมายที่ควบคุม", text: ["ข้อกำหนดนี้จะถูกควบคุมและตีความตามกฎหมายของ <strong>ตุรกี</strong> โดยไม่คำนึงถึงบทบัญญัติเกี่ยวกับความขัดแย้งของกฎหมาย ข้อพิพาทใดๆ ที่เกิดจากข้อกำหนดนี้จะอยู่ภายใต้เขตอำนาจศาลแต่เพียงผู้เดียวของศาลที่มีอำนาจในตุรกี", "หากคุณเป็นผู้บริโภคในสหภาพยุโรป คุณอาจได้รับประโยชน์จากบทบัญญัติคุ้มครองบังคับใดๆ ของกฎหมายประเทศที่คุณพำนักอยู่"] },
                    s11: { heading: "11. การแบ่งแยกได้", text: ["หากพบว่าบทบัญญัติใดของข้อกำหนดนี้ไม่ถูกต้อง ผิดกฎหมาย หรือไม่สามารถบังคับใช้ได้ตามกฎหมายที่เกี่ยวข้อง บทบัญญัติดังกล่าวจะถูกแก้ไขเท่าที่จำเป็นเพื่อให้บังคับใช้ได้ และบทบัญญัติที่เหลือจะมีผลบังคับใช้ต่อไปโดยสมบูรณ์"] },
                    s12: { heading: "12. ข้อตกลงทั้งหมด", text: ["ข้อกำหนดนี้ร่วมกับ <a href=\"privacy-policy.html\">นโยบายความเป็นส่วนตัว</a> ของเราถือเป็นข้อตกลงทั้งหมดระหว่างคุณกับ Hexlume Games เกี่ยวกับ Sudoku 9 และแทนที่ข้อตกลง การแสดง หรือความเข้าใจก่อนหน้านี้หรือร่วมสมัยทั้งหมด"] },
                    contact: { heading: "ติดต่อเรา", pre: "มีคำถามเกี่ยวกับข้อกำหนดนี้? ติดต่อเราได้ที่:", sub: "Hexlume Games &nbsp;·&nbsp; ผู้พัฒนาเกมอิสระ" }
                }
            }
        };

        function sec(html) { const d = document.createElement('div'); d.className = 'tos-section'; d.innerHTML = html; return d; }
        function render(code) {
            const L = LANGS[code]; if (!L) return;
            document.documentElement.lang = code; document.documentElement.dir = L.dir;
            document.getElementById('tos-title').textContent = L.title;
            document.title = L.title + ' – Sudoku 9';
            const main = document.getElementById('tos-main'); main.innerHTML = '';
            const s = L.sections;
            main.appendChild(sec(`<div class="badge">${s.agreement.badge}</div>${s.agreement.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s1.heading}</h2>${s.s1.text.map(p => `<p>${p}</p>`).join('')}<ul>${s.s1.items.map(i => `<li>${i}</li>`).join('')}</ul>`));
            main.appendChild(sec(`<h2>${s.s2.heading}</h2>${s.s2.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s3.heading}</h2>${s.s3.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s4.heading}</h2><p>${s.s4.text}</p><ul>${s.s4.items.map(i => `<li>${i}</li>`).join('')}</ul><p>${s.s4.note}</p>`));
            main.appendChild(sec(`<h2>${s.s5.heading}</h2>${s.s5.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s6.heading}</h2>${s.s6.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s7.heading}</h2>${s.s7.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s8.heading}</h2>${s.s8.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s9.heading}</h2>${s.s9.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s10.heading}</h2>${s.s10.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s11.heading}</h2>${s.s11.text.map(p => `<p>${p}</p>`).join('')}`));
            main.appendChild(sec(`<h2>${s.s12.heading}</h2>${s.s12.text.map(p => `<p>${p}</p>`).join('')}`));
            const cb = document.createElement('div'); cb.className = 'contact-box';
            cb.innerHTML = `<h2>${s.contact.heading}</h2><p>${s.contact.pre}</p><p class="contact-email">hexlume.games@gmail.com</p><p class="contact-sub">${s.contact.sub}<br/><a href="${STORE_URL}" target="_blank" rel="noopener">Google Play Store</a></p>`;
            main.appendChild(cb);
        }

        (function () {
            const bar = document.getElementById('lang-bar');
            for (const [code, data] of Object.entries(LANGS)) {
                const btn = document.createElement('button'); btn.className = 'lang-btn'; btn.dataset.lang = code; btn.textContent = data.label;
                btn.onclick = () => { document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(code); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                bar.appendChild(btn);
            }
            const browser = (navigator.language || '').toLowerCase().split('-')[0];
            const target = LANGS[browser] ? browser : 'en';
            document.querySelector(`[data-lang="${target}"]`).classList.add('active');
            render(target);
        })();
    </script>
