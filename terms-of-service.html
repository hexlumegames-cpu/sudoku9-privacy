                    s3: { heading: "3. In-App-Werbung", text: ["Sudoku 9 ist kostenlos spielbar und wird durch Werbung von <strong>Google AdMob</strong> unterstützt. Mit der Nutzung der App stimmen Sie der Anzeige von Werbung zu, die Bannerwerbung, Interstitial-Werbung und Belohnungsvideos umfassen kann.", "Sie können auf dem Einwilligungsbildschirm beim ersten Start oder jederzeit über das Einstellungsmenü der App auswählen, ob Sie personalisierte oder nicht personalisierte Werbung erhalten möchten. Der Widerruf der Einwilligung für personalisierte Werbung entfernt keine Werbung aus der App."] },
                    s4: { heading: "4. Nutzerverhalten", text: ["Sie stimmen zu, Sudoku 9 nicht zu folgenden Zwecken zu nutzen:"], items: ["Die Integrität oder Leistung der App zu beeinträchtigen oder zu stören.", "Zu versuchen, unbefugten Zugriff auf Teile der App oder zugehörige Systeme zu erlangen.", "Automatisierte Skripte, Bots oder Cheat-Software zur Manipulation von Spieldaten zu verwenden.", "Geltende lokale, nationale oder internationale Gesetze oder Vorschriften zu verletzen."], note: "Wir behalten uns das Recht vor, Ihren Zugriff auf die App bei Verstoß gegen diese Regeln zu beenden." },
                    s5: { heading: "5. Datenschutz", text: ["Ihre Nutzung von Sudoku 9 unterliegt auch unserer <a href=\"privacy-policy.html\">Datenschutzerklärung</a>, die durch Verweis in diese Bedingungen aufgenommen wird. Bitte lesen Sie sie sorgfältig durch, um unsere Praktiken zu verstehen."] },
                    s6: { heading: "6. Haftungsausschlüsse und Gewährleistung", text: ["Sudoku 9 wird <strong>\"wie besehen\"</strong> und <strong>\"wie verfügbar\"</strong> ohne jegliche ausdrückliche oder stillschweigende Gewährleistung bereitgestellt, einschließlich, aber nicht beschränkt auf die Gewährleistung der Marktgängigkeit, der Eignung für einen bestimmten Zweck oder der Nichtverletzung von Rechten Dritter.", "Wir garantieren nicht, dass die App unterbrechungsfrei, fehlerfrei, sicher oder frei von Viren oder anderen schädlichen Komponenten ist. Wir übernehmen keine Gewähr für die Richtigkeit, Zuverlässigkeit oder Vollständigkeit von Inhalten."] },
                    s7: { heading: "7. Haftungsbeschränkung", text: ["Im größtmöglichen, gesetzlich zulässigen Umfang haften Hexlume Games und seine Eigentümer, verbundenen Unternehmen, Mitarbeiter und Vertreter nicht für indirekte, zufällige, besondere, Folgeschäden, Strafschäden oder exemplarische Schäden – einschließlich, aber nicht beschränkt auf Datenverlust, Gewinnverlust oder Verlust des Firmenwerts – die aus oder im Zusammenhang mit Ihrer Nutzung (oder Unfähigkeit zur Nutzung) von Sudoku 9 entstehen.", "Unsere gesamte kumulative Haftung Ihnen gegenüber für Ansprüche aus diesen Bedingungen oder Ihrer Nutzung der App übersteigt nicht den Betrag, den Sie (falls vorhanden) in den zwölf Monaten vor dem Anspruch an Hexlume Games gezahlt haben."] },
                    s8: { heading: "8. Aktualisierungen und Änderungen", text: ["Wir können Sudoku 9 (oder Teile davon) jederzeit ohne Vorankündigung aktualisieren, ändern oder einstellen. Wir können diese Bedingungen jederzeit aktualisieren, indem wir die überarbeitete Version auf dieser Seite mit einem neuen Datum der „Letzten Aktualisierung“ veröffentlichen.", "Ihre fortgesetzte Nutzung der App nach Veröffentlichung von Änderungen gilt als Zustimmung zu den aktualisierten Bedingungen. Wenn Sie mit Änderungen nicht einverstanden sind, müssen Sie die Nutzung der App einstellen."] },
                    s9: { heading: "9. Kündigung", text: ["Diese Bedingungen bleiben bis zu ihrer Kündigung in Kraft. Ihre Rechte aus diesen Bedingungen enden automatisch ohne vorherige Ankündigung, wenn Sie gegen eine Bestimmung verstoßen. Im Falle der Kündigung müssen Sie die Nutzung der App einstellen und alle in Ihrem Besitz befindlichen Kopien löschen.", "Wir behalten uns das Recht vor, den Zugang zu Sudoku 9 nach unserem alleinigen Ermessen ohne vorherige Ankündigung zu beenden oder auszusetzen, wenn wir der Ansicht sind, dass Ihr Verhalten gegen diese Bedingungen verstößt oder anderen Benutzern, uns oder Dritten schadet."] },
                    s10: { heading: "10. Geltendes Recht", text: ["Diese Bedingungen unterliegen den Gesetzen der <strong>Türkei</strong> und sind in Übereinstimmung mit diesen auszulegen, ohne Berücksichtigung von Kollisionsnormen. Jegliche Streitigkeiten aus diesen Bedingungen unterliegen der ausschließlichen Zuständigkeit der zuständigen Gerichte der Türkei.", "Wenn Sie ein Verbraucher in der Europäischen Union sind, können Sie auch von zwingenden Schutzbestimmungen des Rechts des Landes profitieren, in dem Sie Ihren Wohnsitz haben."] },

                    s2: { heading: "2. Propriété intellectuelle", text: ["Sudoku 9 et tout son contenu — y compris, mais sans s'y limiter, les graphismes, sons, code, mécanismes de jeu, habillage commercial et la marque Hexlume Games — sont la propriété exclusive de Hexlume Games ou de ses concédants et sont protégés par les lois applicables en matière de propriété intellectuelle.", "Les règles mathématiques standard du Sudoku sont dans le domaine public. Notre mise en œuvre, nos illustrations, nos sons et nos logiciels sont propriétaires."] },
                    s3: { heading: "3. Publicité intégrée", text: ["Sudoku 9 est gratuit et soutenu par des publicités diffusées par <strong>Google AdMob</strong>. En utilisant l'application, vous acceptez l'affichage de publicités, qui peuvent inclure des bannières, des publicités interstitielles et des vidéos récompensées.", "Vous pouvez choisir de recevoir des publicités personnalisées ou non personnalisées via l'écran de consentement au premier lancement, ou à tout moment via le menu Paramètres de l'application. Le retrait du consentement pour les publicités personnalisées ne supprime pas les publicités de l'application."] },
                    s4: { heading: "4. Conduite de l'utilisateur", text: ["Vous acceptez de ne pas utiliser Sudoku 9 pour :"], items: ["Interférer avec ou perturber l'intégrité ou les performances de l'application.", "Tenter d'obtenir un accès non autorisé à une partie de l'application ou aux systèmes associés.", "Utiliser des scripts automatisés, des robots ou des logiciels de triche pour manipuler les données du jeu.", "Violer toute loi ou réglementation locale, nationale ou internationale applicable."], note: "Nous nous réservons le droit de résilier votre accès à l'application en cas de violation de ces règles." },

                    s6: { heading: "6. Exonérations de responsabilité et garantie", text: ["Sudoku 9 est fourni <strong>„en l'état“</strong> et <strong>„selon disponibilité“</strong> sans aucune garantie expresse ou implicite, y compris, mais sans s'y limiter, les garanties de qualité marchande, d'adéquation à un usage particulier ou d'absence de contrefaçon.", "Nous ne garantissons pas que l'application sera ininterrompue, sans erreur, sécurisée ou exempte de virus ou d'autres composants nuisibles. Nous ne donnons aucune garantie quant à l'exactitude, la fiabilité ou l'exhaustivité du contenu."] },
                    s7: { heading: "7. Limitation de responsabilité", text: ["Dans toute la mesure permise par la loi applicable, Hexlume Games et ses propriétaires, sociétés affiliées, employés et mandataires ne sauraient être tenus responsables des dommages indirects, accessoires, spéciaux, consécutifs, punitifs ou exemplaires — y compris, mais sans s'y limiter, la perte de données, la perte de bénéfices ou la perte de clientèle — découlant de ou liés à votre utilisation (ou incapacité à utiliser) Sudoku 9.", "Notre responsabilité cumulative totale envers vous pour toute réclamation découlant des présentes Conditions ou de votre utilisation de l'application ne dépasse pas le montant que vous avez payé (le cas échéant) à Hexlume Games au cours des douze mois précédant la réclamation."] },
                    s8: { heading: "8. Mises à jour et modifications", text: ["Nous pouvons mettre à jour, modifier ou interrompre Sudoku 9 (ou toute partie de celui-ci) à tout moment sans préavis. Nous pouvons également mettre à jour les présentes Conditions à tout moment en affichant la version révisée sur cette page avec une nouvelle date de „Dernière mise à jour“.", "Votre utilisation continue de l'application après la publication des modifications constitue votre acceptation des Conditions mises à jour. Si vous n'êtes pas d'accord avec les modifications, vous devez cesser d'utiliser l'application."] },
                    s9: { heading: "9. Résiliation", text: ["Les présentes Conditions restent en vigueur jusqu'à leur résiliation. Vos droits en vertu des présentes Conditions prendront automatiquement fin sans préavis de notre part si vous ne respectez pas l'une des conditions. En cas de résiliation, vous devez cesser toute utilisation de l'application et supprimer toutes les copies en votre possession.", "Nous nous réservons le droit de résilier ou de suspendre l'accès à Sudoku 9 à notre seule discrétion, sans préavis, pour un comportement que nous estimons contraire aux présentes Conditions ou nuisible aux autres utilisateurs, à nous-mêmes ou à des tiers."] },
                    s10: { heading: "10. Droit applicable", text: ["Les présentes Conditions sont régies par les lois de la <strong>Turquie</strong>, sans égard à ses dispositions en matière de conflit de lois. Tout litige découlant des présentes Conditions sera soumis à la compétence exclusive des tribunaux compétents de Turquie.", "Si vous êtes un consommateur dans l'Union européenne, vous pouvez également bénéficier des dispositions protectrices obligatoires de la loi du pays dans lequel vous résidez."] },
                    s11: { heading: "11. Divisibilité", text: ["Si une disposition des présentes Conditions est jugée invalide, illégale ou inapplicable en vertu de la loi applicable, cette disposition sera modifiée dans la mesure minimale nécessaire pour la rendre applicable, et les dispositions restantes continueront de produire leurs effets."] },
                    s12: { heading: "12. Intégralité de l'accord", text: ["Les présentes Conditions, ainsi que notre <a href=\"privacy-policy.html\">Politique de confidentialité</a>, constituent l'intégralité de l'accord entre vous et Hexlume Games concernant Sudoku 9 et remplacent tous les accords, déclarations ou ententes antérieurs ou contemporains."] },

            es: {

                    s2: { heading: "2. Propiedad intelectual", text: ["Sudoku 9 y todo su contenido —incluyendo, entre otros, gráficos, sonidos, código, mecánicas de juego, imagen comercial y la marca Hexlume Games— son propiedad exclusiva de Hexlume Games o sus licenciantes y están protegidos por las leyes de propiedad intelectual aplicables.", "Las reglas matemáticas estándar del Sudoku son de dominio público. Nuestra implementación, ilustraciones, audio y software son propiedad exclusiva."] },
                    s3: { heading: "3. Publicidad integrada", text: ["Sudoku 9 es gratuito y está respaldado por anuncios servidos por <strong>Google AdMob</strong>. Al usar la aplicación, acepta la visualización de anuncios, que pueden incluir anuncios de banner, intersticiales y videos recompensados.", "Puede elegir recibir anuncios personalizados o no personalizados a través de la pantalla de consentimiento en el primer inicio, o en cualquier momento a través del menú de Configuración de la aplicación. Retirar el consentimiento para anuncios personalizados no elimina los anuncios de la aplicación."] },
                    s4: { heading: "4. Conducta del usuario", text: ["Usted acepta no utilizar Sudoku 9 para:"], items: ["Interferir o interrumpir la integridad o el rendimiento de la aplicación.", "Intentar obtener acceso no autorizado a cualquier parte de la aplicación o sistemas relacionados.", "Utilizar scripts automatizados, bots o software de trampas para manipular datos del juego.", "Violar cualquier ley o regulación local, nacional o internacional aplicable."], note: "Nos reservamos el derecho de terminar su acceso a la aplicación por violación de estas reglas." },
                    s5: { heading: "5. Privacidad", text: ["Su uso de Sudoku 9 también se rige por nuestra <a href=\"privacy-policy.html\">Política de Privacidad</a>, que se incorpora a estos Términos por referencia. Revísala detenidamente para comprender nuestras prácticas."] },
                    s6: { heading: "6. Renuncias y garantía", text: ["Sudoku 9 se proporciona <strong>\"tal cual\"</strong> y <strong>\"según disponibilidad\"</strong> sin ningún tipo de garantía, expresa o implícita, incluyendo, entre otras, las garantías de comerciabilidad, idoneidad para un propósito particular o no infracción.", "No garantizamos que la aplicación sea ininterrumpida, libre de errores, segura o libre de virus u otros componentes dañinos. No ofrecemos ninguna garantía sobre la precisión, confiabilidad o integridad de ningún contenido."] },
                    s7: { heading: "7. Limitación de responsabilidad", text: ["En la máxima medida permitida por la ley aplicable, Hexlume Games y sus propietarios, afiliados, empleados y agentes no serán responsables por daños indirectos, incidentales, especiales, consecuentes, punitivos o ejemplares —incluyendo, entre otros, pérdida de datos, pérdida de beneficios o pérdida de buena voluntad— que surjan de o en conexión con su uso (o incapacidad para usar) Sudoku 9.", "Nuestra responsabilidad acumulativa total hacia usted por cualquier reclamo derivado de estos Términos o su uso de la aplicación no excederá el monto que haya pagado (si lo hubiera) a Hexlume Games en los doce meses anteriores al reclamo."] },
                    s8: { heading: "8. Actualizaciones y modificaciones", text: ["Podemos actualizar, modificar o discontinuar Sudoku 9 (o cualquier parte del mismo) en cualquier momento sin previo aviso. También podemos actualizar estos Términos en cualquier momento publicando la versión revisada en esta página con una nueva fecha de \"Última actualización\".", "Su uso continuado de la aplicación después de publicados los cambios constituye su aceptación de los Términos actualizados. Si no está de acuerdo con algún cambio, debe dejar de usar la aplicación."] },
                    s9: { heading: "9. Terminación", text: ["Estos Términos permanecen vigentes hasta su terminación. Sus derechos bajo estos Términos terminarán automáticamente sin previo aviso si no cumple con alguna disposición. Tras la terminación, debe cesar todo uso de la aplicación y eliminar todas las copias en su posesión.", "Nos reservamos el derecho de terminar o suspender el acceso a Sudoku 9 a nuestra sola discreción, sin previo aviso, por conductas que creamos que violan estos Términos o que sean perjudiciales para otros usuarios, para nosotros o para terceros."] },
                    s10: { heading: "10. Ley aplicable", text: ["Estos Términos se regirán e interpretarán de acuerdo con las leyes de <strong>Turquía</strong>, sin tener en cuenta sus disposiciones sobre conflicto de leyes. Cualquier disputa que surja de estos Términos estará sujeta a la jurisdicción exclusiva de los tribunales competentes de Turquía.", "Si es un consumidor en la Unión Europea, también puede beneficiarse de cualquier disposición protectora obligatoria de la ley del país en el que resida."] },
                    s11: { heading: "11. Divisibilidad", text: ["Si alguna disposición de estos Términos se considera inválida, ilegal o inaplicable según la ley aplicable, dicha disposición se modificará en la medida mínima necesaria para hacerla aplicable, y las disposiciones restantes continuarán en pleno vigor y efecto."] },
                    s12: { heading: "12. Acuerdo completo", text: ["Estos Términos, junto con nuestra <a href=\"privacy-policy.html\">Política de Privacidad</a>, constituyen el acuerdo completo entre usted y Hexlume Games con respecto a Sudoku 9 y reemplazan todos los acuerdos, representaciones o entendimientos previos o contemporáneos."] },

                    s1: { heading: "1. Licenza d'uso", text: ["Hexlume Games ti concede una licenza limitata, non esclusiva, non trasferibile e revocabile per scaricare e utilizzare Sudoku 9 su un dispositivo di tua proprietà o controllo, esclusivamente per scopi di intrattenimento personale non commerciale.", "Non puoi:"], items: ["Copiare, modificare, adattare, tradurre o creare opere derivate basate sull'app.", "Effettuare reverse engineering, decompilare, disassemblare o tentare di derivare il codice sorgente.", "Vendere, concedere in sublicenza, distribuire o trasferire l'app o qualsiasi diritto ad essa relativo a terzi.", "Rimuovere o alterare eventuali avvisi, etichette o marchi di proprietà sull'app.", "Utilizzare l'app per scopi commerciali senza il nostro preventivo consenso scritto."] },
                    s2: { heading: "2. Proprietà intellettuale", text: ["Sudoku 9 e tutto il suo contenuto — inclusi, a titolo esemplificativo, grafica, suoni, codice, meccaniche di gioco, immagine commerciale e il marchio Hexlume Games — sono di proprietà esclusiva di Hexlume Games o dei suoi licenzianti e sono protetti dalle leggi applicabili in materia di proprietà intellettuale.", "Le regole matematiche standard del Sudoku sono di pubblico dominio. La nostra implementazione, opere grafiche, audio e software sono proprietari."] },
                    s3: { heading: "3. Pubblicità in-app", text: ["Sudoku 9 è gratuito e supportato da annunci pubblicitari serviti da <strong>Google AdMob</strong>. Utilizzando l'app accetti la visualizzazione di annunci, che possono includere annunci banner, interstiziali e video premio.", "Puoi scegliere se ricevere annunci personalizzati o non personalizzati tramite la schermata di consenso al primo avvio, o in qualsiasi momento attraverso il menu Impostazioni dell'app. La revoca del consenso per gli annunci personalizzati non rimuove gli annunci dall'app."] },

                    s6: { heading: "6. Esclusioni di garanzia", text: ["Sudoku 9 è fornito <strong>\"così com'è\"</strong> e <strong>\"come disponibile\"</strong> senza alcuna garanzia di alcun tipo, espressa o implicita, incluse, a titolo esemplificativo, le garanzie di commerciabilità, idoneità per uno scopo particolare o non violazione di diritti altrui.", "Non garantiamo che l'app sarà ininterrotta, priva di errori, sicura o priva di virus o altri componenti dannosi. Non forniamo alcuna garanzia riguardo all'accuratezza, affidabilità o completezza di alcun contenuto."] },

                    s8: { heading: "8. Aggiornamenti e modifiche", text: ["Possiamo aggiornare, modificare o interrompere Sudoku 9 (o qualsiasi parte di esso) in qualsiasi momento senza preavviso. Possiamo anche aggiornare questi Termini in qualsiasi momento pubblicando la versione rivista su questa pagina con una nuova data di \"Ultimo aggiornamento\".", "Il tuo utilizzo continuato dell'app dopo la pubblicazione delle modifiche costituisce accettazione dei Termini aggiornati. Se non sei d'accordo con le modifiche, devi interrompere l'uso dell'app."] },

                    s4: { heading: "4. Поведение пользователя", text: ["Вы соглашаетесь не использовать Sudoku 9 для:"], items: ["Вмешательства в работу или нарушения целостности или производительности приложения.", "Попытки получить несанкционированный доступ к какой-либо части приложения или связанных с ним систем.", "Использования автоматических скриптов, ботов или читерского программного обеспечения для манипулирования игровыми данными.", "Нарушения любого применимого местного, национального или международного закона или нормативного акта."], note: "Мы оставляем за собой право прекратить ваш доступ к приложению за нарушение этих правил." },

                    s9: { heading: "9. Прекращение действия", text: ["Настоящие Условия остаются в силе до прекращения их действия. Ваши права по настоящим Условиям будут автоматически прекращены без уведомления с нашей стороны, если вы не соблюдаете какое-либо условие. После прекращения действия вы должны прекратить любое использование приложения и удалить все его копии, находящиеся в вашем распоряжении.", "Мы оставляем за собой право прекратить или приостановить доступ к Sudoku 9 по нашему sole усмотрению, без предварительного уведомления, за поведение, которое, как мы считаем, нарушает настоящие Условия или наносит вред другим пользователям, нам или третьим лицам."] },
                    s10: { heading: "10. Применимое право", text: ["Настоящие Условия регулируются и толкуются в соответствии с законами <strong>Турции</strong>, без учета положений о коллизионных нормах. Любой спор, возникающий из настоящих Условий, подлежит исключительной юрисдикции компетентных судов Турции.", "Если вы являетесь потребителем в Европейском Союзе, вы также можете воспользоваться любыми обязательными защитными положениями закона страны, в которой вы проживаете."] },
                    s11: { heading: "11. Делимость", text: ["Если какое-либо положение настоящих Условий будет признано недействительным, незаконным или не имеющим исковой силы в соответствии с применимым законодательством, такое положение будет изменено в минимальной степени, необходимой для придания ему исковой силы, а остальные положения останутся в полной силе и действии."] },

                    s1: { heading: "1. ترخيص الاستخدام", text: ["تمنحك Hexlume Games ترخيصًا محدودًا وغير حصري وغير قابل للتحويل وقابل للإلغاء لتنزيل واستخدام Sudoku 9 على جهاز تملكه أو تتحكم فيه، فقط لأغراض الترفيه الشخصي غير التجاري.", "لا يجوز لك:"], items: ["نسخ التطبيق أو تعديله أو تكييفه أو ترجمته أو إنشاء أعمال مشتقة بناءً عليه.", "إجراء هندسة عكسية أو فك ترجمة أو تفكيك أو محاولة استخلاص كود المصدر.", "بيع أو ترخيص من الباطن أو توزيع أو نقل التطبيق أو أي حقوق فيه إلى أي طرف ثالث.", "إزالة أو تغيير أي إشعارات ملكية أو ملصقات أو علامات على التطبيق.", "استخدام التطبيق لأي غرض تجاري دون موافقتنا الكتابية المسبقة."] },

                    s3: { heading: "3. الإعلانات داخل التطبيق", text: ["Sudoku 9 مجاني ومدعوم بالإعلانات التي يقدمها <strong>Google AdMob</strong>. باستخدام التطبيق، فإنك توافق على عرض الإعلانات، والتي قد تشمل إعلانات البانر والإعلانات البينية وفيديو المكافآت.", "يمكنك اختيار تلقي إعلانات مخصصة أو غير مخصصة عبر شاشة الموافقة عند التشغيل الأول، أو في أي وقت من خلال قائمة الإعدادات في التطبيق. سحب الموافقة على الإعلانات المخصصة لا يزيل الإعلانات من التطبيق."] },
                    s4: { heading: "4. سلوك المستخدم", text: ["أنت توافق على عدم استخدام Sudoku 9 من أجل:"], items: ["التدخل في سلامة أو أداء التطبيق أو تعطيله.", "محاولة الحصول على وصول غير مصرح به إلى أي جزء من التطبيق أو الأنظمة ذات الصلة.", "استخدام نصوص برمجية آلية أو روبوتات أو برامج غش للتلاعب ببيانات اللعبة.", "انتهاك أي قانون أو لائحة محلية أو وطنية أو دولية معمول بها."], note: "نحتفظ بالحق في إنهاء وصولك إلى التطبيق في حالة انتهاك هذه القواعد." },
                    s5: { heading: "5. الخصوصية", text: ["يخضع استخدامك لـ Sudoku 9 أيضًا <a href=\"privacy-policy.html\">لسياسة الخصوصية</a> الخاصة بنا، والتي تم دمجها في هذه الشروط بالإشارة. يرجى مراجعتها بعناية لفهم ممارساتنا."] },
                    s6: { heading: "6. إخلاء المسؤولية والضمان", text: ["يتم توفير Sudoku 9 <strong>\"كما هو\"</strong> و <strong>\"كما هو متاح\"</strong> دون أي ضمان من أي نوع، صريح أو ضمني، بما في ذلك على سبيل المثال لا الحصر ضمانات القابلية للتسويق والملاءمة لغرض معين وعدم الانتهاك.", "نحن لا نضمن أن التطبيق سيكون دون انقطاع أو خالٍ من الأخطاء أو آمنًا أو خاليًا من الفيروسات أو المكونات الضارة الأخرى. نحن لا نقدم أي ضمان فيما يتعلق بدقة أو موثوقية أو اكتمال أي محتوى."] },
                    s7: { heading: "7. تحديد المسؤولية", text: ["على أقصى حد يسمح به القانون المعمول به، لا تكون Hexlume Games وأصحابها والشركات التابعة لها والموظفون والوكلاء مسؤولين عن أي أضرار غير مباشرة أو عرضية أو خاصة أو تبعية أو عقابية أو تأديبية — بما في ذلك على سبيل المثال لا الحصر فقدان البيانات أو فقدان الأرباح أو فقدان السمعة — الناشئة عن أو فيما يتعلق باستخدامك (أو عدم قدرتك على استخدام) Sudoku 9.", "لا يتجاوز إجمالي مسؤوليتنا التراكمية تجاهك عن أي مطالبات ناشئة عن هذه الشروط أو استخدامك للتطبيق المبلغ الذي دفعته (إن وجد) إلى Hexlume Games في الأشهر الاثني عشر السابقة للمطالبة."] },
                    s8: { heading: "8. التحديثات والتعديلات", text: ["قد نقوم بتحديث أو تعديل أو إيقاف Sudoku 9 (أو أي جزء منه) في أي وقت دون إشعار. قد نقوم أيضًا بتحديث هذه الشروط في أي وقت عن طريق نشر النسخة المنقحة على هذه الصفحة مع تاريخ \"آخر تحديث\" جديد.", "استمرارك في استخدام التطبيق بعد نشر التغييرات يشكل قبولك للشروط المحدثة. إذا كنت لا توافق على أي تغييرات، فيجب عليك التوقف عن استخدام التطبيق."] },
                    s9: { heading: "9. الإنهاء", text: ["تظل هذه الشروط سارية المفعول حتى يتم إنهاؤها. ستنتهي حقوقك بموجب هذه الشروط تلقائيًا دون إشعار منا إذا فشلت في الامتثال لأي شرط. عند الإنهاء، يجب عليك التوقف عن جميع استخدامات التطبيق وحذف جميع النسخ الموجودة بحوزتك.", "نحتفظ بالحق في إنهاء أو تعليق الوصول إلى Sudoku 9 وفقًا لتقديرنا الخاص، دون إشعار مسبق، بسبب سلوك نعتقد أنه ينتهك هذه الشروط أو يضر بالمستخدمين الآخرين أو بنا أو بأطراف ثالثة."] },
                    s10: { heading: "10. القانون الحاكم", text: ["تخضع هذه الشروط وتفسر وفقًا لقوانين <strong>تركيا</strong>، دون اعتبار لأحكامها المتعلقة بتضارب القوانين. أي نزاع ينشأ عن هذه الشروط يخضع للاختصاص القضائي الحصري للمحاكم المختصة في تركيا.", "إذا كنت مستهلكًا في الاتحاد الأوروبي، فقد تستفيد أيضًا من أي أحكام وقائية إلزامية بموجب قانون البلد الذي تقيم فيه."] },
                    s11: { heading: "11. قابلية التجزئة", text: ["إذا تم العثور على أي حكم من هذه الشروط غير صالح أو غير قانوني أو غير قابل للتنفيذ بموجب القانون المعمول به، فسيتم تعديل هذا الحكم إلى الحد الأدنى الضروري لجعله قابلاً للتنفيذ، وستظل الأحكام المتبقية سارية بالكامل."] },
                    s12: { heading: "12. الاتفاق الكامل", text: ["تشكل هذه الشروط، إلى جانب <a href=\"privacy-policy.html\">سياسة الخصوصية</a> الخاصة بنا، الاتفاق الكامل بينك وبين Hexlume Games فيما يتعلق بـ Sudoku 9 وتحل محل جميع الاتفاقيات أو الإقرارات أو التفاهمات السابقة أو المعاصرة."] },
                    contact: { heading: "اتصل بنا", pre: "أسئلة حول هذه الشروط؟ تواصل معنا على:", sub: "Hexlume Games &nbsp;·&nbsp; مطور ألعاب مستقل" }
                }

            zh: {

                    agreement: { badge: "协议", text: ["本服务条款（\"条款\"）管辖您使用由 <strong>Hexlume Games</strong>（\"我们\"、\"我方\"）开发和发布的 <strong>Sudoku 9</strong> 移动应用程序。下载、安装或使用 Sudoku 9 即表示您同意受这些条款的约束。", "如果您不同意这些条款，请勿使用该应用程序。"] },

                    s2: { heading: "2. 知识产权", text: ["Sudoku 9 及其所有内容（包括但不限于图形、声音、代码、游戏机制、商业外观和 Hexlume Games 品牌）是 Hexlume Games 或其许可方的专有财产，并受适用的知识产权法律保护。", "数独的标准数学规则属于公共领域。我们的实现、艺术品、音频和软件是专有的。"] },

                    s4: { heading: "4. 用户行为", text: ["您同意不将 Sudoku 9 用于以下目的："], items: ["干扰或破坏应用程序的完整性或性能。", "试图获得对应用程序任何部分或相关系统的未经授权访问。", "使用自动化脚本、机器人或作弊软件来操纵游戏数据。", "违反任何适用的地方、国家或国际法律或法规。"], note: "我们保留因违反这些规则而终止您对应用程序访问的权利。" },
                    s5: { heading: "5. 隐私", text: ["您对 Sudoku 9 的使用还受我们的 <a href=\"privacy-policy.html\">隐私政策</a> 的约束，该政策通过引用纳入本条款。请仔细阅读以了解我们的做法。"] },
                    s6: { heading: "6. 免责声明与保证", text: ["Sudoku 9 按 <strong>\"原样\"</strong> 和 <strong>\"可用\"</strong> 提供，不提供任何明示或暗示的保证，包括但不限于适销性、特定用途适用性或不侵权的保证。", "我们不保证该应用程序不会中断、没有错误、安全或没有病毒或其他有害组件。我们不对任何内容的准确性、可靠性或完整性作出任何保证。"] },
                    s7: { heading: "7. 责任限制", text: ["在适用法律允许的最大范围内，Hexlume Games 及其所有者、关联公司、员工和代理人不对因您使用（或无法使用）Sudoku 9 而引起或与之相关的任何间接、附带、特殊、后果性、惩罚性或惩戒性损害赔偿（包括但不限于数据丢失、利润损失或商誉损失）承担责任。", "对于因本条款或您使用该应用程序而引起的任何索赔，我们对您的总计累积责任不超过您在索赔前十二个月内向 Hexlume Games 支付的（如有）金额。"] },
                    s8: { heading: "8. 更新与修改", text: ["我们可随时在未经通知的情况下更新、修改或中止 Sudoku 9（或其任何部分）。我们也可随时通过在本页面上发布修订版本并注明新的“最后更新”日期来更新本条款。", "在发布更改后继续使用该应用程序即表示您接受更新后的条款。如果您不同意任何更改，则必须停止使用该应用程序。"] },
                    s9: { heading: "9. 终止", text: ["本条款在终止前一直有效。如果您未能遵守任何条款，您在本条款下的权利将自动终止，恕不另行通知。终止后，您必须停止使用该应用程序并删除您持有的所有副本。", "我们保留自行决定终止或暂停您访问 Sudoku 9 的权利，无需事先通知，如果我们认为您的行为违反了本条款或对其他用户、我们或第三方有害。"] },
                    s10: { heading: "10. 管辖法律", text: ["本条款应受 <strong>土耳其</strong> 法律管辖并据其解释，不考虑其冲突法规定。因本条款引起的任何争议应受土耳其主管法院的专属管辖权管辖。", "如果您是欧盟的消费者，您还可以享受您居住国法律的任何强制性保护条款。"] },
                    s11: { heading: "11. 可分割性", text: ["如果本条款的任何规定根据适用法律被认定为无效、非法或不可执行，则该规定应进行修改，使其可执行所需的最小程度，其余规定应继续完全有效。"] },
                    s12: { heading: "12. 完整协议", text: ["本条款连同我们的 <a href=\"privacy-policy.html\">隐私政策</a> 构成您与 Hexlume Games 之间关于 Sudoku 9 的完整协议，并取代所有先前或同期的协议、陈述或谅解。"] },

                    s2: { heading: "2. 知的財産権", text: ["Sudoku 9 およびそのすべてのコンテンツ（グラフィック、サウンド、コード、ゲームメカニクス、トレードドレス、Hexlume Games ブランドを含むがこれらに限定されない）は、Hexlume Games またはそのライセンサーの独占的財産であり、適用される知的財産法によって保護されています。", "数独の標準的な数学的ルールはパブリックドメインです。当社の実装、アートワーク、オーディオ、ソフトウェアはプロプライエタリです。"] },
                    s3: { heading: "3. アプリ内広告", text: ["Sudoku 9 は無料でプレイでき、<strong>Google AdMob</strong> が配信する広告によってサポートされています。アプリを使用することにより、バナー広告、インタースティシャル広告、リワード動画広告を含む可能性のある広告の表示に同意したものとみなされます。", "初回起動時の同意画面、またはいつでもアプリの設定メニューから、パーソナライズド広告または非パーソナライズド広告のいずれを受信するかを選択できます。パーソナライズド広告への同意を撤回しても、アプリから広告が削除されることはありません。"] },
                    s4: { heading: "4. ユーザーの行動", text: ["お客様は、Sudoku 9 を以下の目的で使用しないことに同意します："], items: ["アプリの完全性またはパフォーマンスを妨害または破壊すること。", "アプリのいかなる部分または関連システムへの不正アクセスを試みること。", "自動スクリプト、ボット、またはチートソフトウェアを使用してゲームデータを操作すること。", "適用される地方、国家、または国際的な法律または規制に違反すること。"], note: "当社は、これらの規則に違反した場合、アプリへのアクセスを終了する権利を留保します。" },
                    s5: { heading: "5. プライバシー", text: ["Sudoku 9 の使用は、当社の <a href=\"privacy-policy.html\">プライバシーポリシー</a> にも準拠し、本規約に参照により組み込まれます。当社の慣行を理解するために、注意深くご確認ください。"] },
                    s6: { heading: "6. 免責事項と保証", text: ["Sudoku 9 は、商品性、特定目的への適合性、非侵害の保証を含むがこれらに限定されない、明示または黙示を問わずいかなる種類の保証もなく、<strong>「現状有姿」</strong>および<strong>「利用可能なまま」</strong>提供されます。", "当社は、アプリが中断なく、エラーなく、安全に、またはウイルスやその他の有害なコンポーネントがないことを保証しません。当社はいかなるコンテンツの正確性、信頼性、完全性についても保証しません。"] },

                    s8: { heading: "8. 更新と変更", text: ["当社は、予告なくいつでも Sudoku 9（またはその一部）を更新、変更、または中止する場合があります。当社はまた、このページに改訂版を新しい「最終更新日」とともに掲載することにより、いつでも本規約を更新する場合があります。", "変更が掲載された後もアプリを継続して使用することは、更新された規約を受け入れたことになります。変更に同意できない場合は、アプリの使用を中止する必要があります。"] },
                    s9: { heading: "9. 終了", text: ["本規約は、終了されるまで有効です。お客様がいずれかの条項を遵守しない場合、本規約に基づくお客様の権利は、当社からの通知なしに自動的に終了します。終了後は、アプリの使用をすべて中止し、お客様が保有するすべてのコピーを削除するものとします。", "当社は、お客様が本規約に違反している、または他のユーザー、当社、第三者に有害であると当社が判断する行為に対して、事前の通知なしに、当社の単独の裁量で Sudoku 9 へのアクセスを終了または停止する権利を留保します。"] },
                    s10: { heading: "10. 準拠法", text: ["本規約は、<strong>トルコ</strong> の法律に準拠し、同法に従って解釈されるものとし、その抵触法の規定は考慮しません。本規約から生じる紛争は、トルコの管轄裁判所の専属的管轄に服するものとします。", "お客様が欧州連合の消費者である場合、お客様が居住する国の法律の強行的な保護規定の利益も受けることができます。"] },
                    s11: { heading: "11. 分離可能性", text: ["本規約のいずれかの規定が適用される法律に基づいて無効、違法、または執行不能と判断された場合、その規定は、執行可能にするために必要な最小限の範囲で修正され、残りの規定は引き続き完全に効力を維持するものとします。"] },
                    s12: { heading: "12. 完全な合意", text: ["本規約は、当社の <a href=\"privacy-policy.html\">プライバシーポリシー</a> とともに、Sudoku 9 に関するお客様と Hexlume Games との間の完全な合意を構成し、以前のまたは同時期のすべての合意、表明、または了解事項に優先します。"] },

                sections: {

                    s1: { heading: "1. 사용 라이선스", text: ["Hexlume Games는 귀하가 소유하거나 제어하는 기기에서 Sudoku 9를 다운로드하여 사용할 수 있는 제한적이고 비독점적이며 양도 불가능하고 취소 가능한 라이선스를 개인적 비상업적 오락 목적으로만 부여합니다.", "귀하는 다음을 수행할 수 없습니다:"], items: ["앱을 기반으로 복사, 수정, 각색, 번역 또는 파생 작업을 생성합니다.", "리버스 엔지니어링, 디컴파일, 디스어셈블 또는 소스 코드를 도출하려고 시도합니다.", "앱 또는 그 안의 모든 권리를 제3자에게 판매, 서브라이선스, 배포 또는 양도합니다.", "앱의 모든 독점 고지, 레이블 또는 표시를 제거하거나 변경합니다.", "사전 서면 동의 없이 앱을 상업적 목적으로 사용합니다."] },
                    s2: { heading: "2. 지적 재산권", text: ["Sudoku 9 및 모든 콘텐츠(그래픽, 사운드, 코드, 게임 메커니즘, 트레이드 드레스 및 Hexlume Games 브랜드를 포함하되 이에 국한되지 않음)는 Hexlume Games 또는 그 라이선스 제공자의 독점 자산이며 적용 가능한 지적 재산권 법률에 의해 보호됩니다.", "스도쿠의 표준 수학 규칙은 퍼블릭 도메인에 있습니다. 당사의 구현, 아트워크, 오디오 및 소프트웨어는 독점적입니다."] },
                    s3: { heading: "3. 앱 내 광고", text: ["Sudoku 9는 무료로 플레이할 수 있으며 <strong>Google AdMob</strong>에서 제공하는 광고로 지원됩니다. 앱을 사용함으로써 배너 광고, 전면 광고 및 보상형 비디오 광고를 포함할 수 있는 광고 표시에 동의하게 됩니다.", "최초 실행 시 동의 화면을 통해 또는 언제든지 앱의 설정 메뉴를 통해 개인 맞춤형 광고 또는 비개인 맞춤형 광고 수신 여부를 선택할 수 있습니다. 개인 맞춤형 광고에 대한 동의를 철회해도 앱에서 광고가 제거되지는 않습니다."] },
                    s4: { heading: "4. 사용자 행동", text: ["귀하는 Sudoku 9를 다음 목적으로 사용하지 않는 데 동의합니다:"], items: ["앱의 무결성 또는 성능을 간섭하거나 방해합니다.", "앱 또는 관련 시스템의 일부에 대한 무단 액세스를 얻으려고 시도합니다.", "자동화된 스크립트, 봇 또는 치트 소프트웨어를 사용하여 게임 데이터를 조작합니다.", "적용 가능한 모든 지방, 국가 또는 국제 법률 또는 규정을 위반합니다."], note: "당사는 이러한 규칙을 위반할 경우 앱에 대한 액세스를 종료할 권리를 보유합니다." },
                    s5: { heading: "5. 개인정보 보호", text: ["Sudoku 9 사용은 또한 당사의 <a href=\"privacy-policy.html\">개인정보 처리방침</a>의 적용을 받으며, 본 약관에 참조로 포함됩니다. 당사의 관행을 이해하려면 주의 깊게 검토하시기 바랍니다."] },
                    s6: { heading: "6. 면책 조항 및 보증", text: ["Sudoku 9는 상품성, 특정 목적에의 적합성 또는 비침해에 대한 보증을 포함하되 이에 국한되지 않는 모든 종류의 명시적 또는 묵시적 보증 없이 <strong>\"있는 그대로\"</strong> 및 <strong>\"사용 가능한 대로\"</strong> 제공됩니다.", "당사는 앱이 중단 없이, 오류 없이, 안전하게 또는 바이러스 또는 기타 유해한 구성 요소가 없을 것이라고 보증하지 않습니다. 당사는 콘텐츠의 정확성, 신뢰성 또는 완전성에 대해 어떠한 보증도 하지 않습니다."] },
                    s7: { heading: "7. 책임의 제한", text: ["적용 가능한 법률이 허용하는 최대 범위 내에서 Hexlume Games 및 그 소유자, 계열사, 직원 및 대리인은 Sudoku 9 사용(또는 사용 불능)으로 인해 발생하거나 이와 관련하여 발생하는 간접적, 부수적, 특별, 결과적, 징벌적 또는 예시적 손해(데이터 손실, 이익 손실 또는 영업권 손실을 포함하되 이에 국한되지 않음)에 대해 책임을 지지 않습니다.", "본 약관 또는 앱 사용으로 인해 발생하는 모든 청구에 대해 귀하에 대한 당사의 총 누적 책임은 청구 이전 12개월 동안 귀하가 Hexlume Games에 지불한(있는 경우) 금액을 초과하지 않습니다."] },
                    s8: { heading: "8. 업데이트 및 수정", text: ["당사는 통지 없이 언제든지 Sudoku 9(또는 그 일부)를 업데이트, 수정 또는 중단할 수 있습니다. 당사는 또한 이 페이지에 수정된 버전을 새로운 \"최종 업데이트\" 날짜와 함께 게시함으로써 언제든지 본 약관을 업데이트할 수 있습니다.", "변경 사항이 게시된 후 앱을 계속 사용하면 업데이트된 약관에 동의하는 것입니다. 변경 사항에 동의하지 않으면 앱 사용을 중단해야 합니다."] },
                    s9: { heading: "9. 종료", text: ["본 약관은 종료될 때까지 유효합니다. 귀하가 어떤 조항을 준수하지 않을 경우 본 약관에 따른 귀하의 권리는 당사의 통지 없이 자동으로 종료됩니다. 종료 시 귀하는 앱의 모든 사용을 중단하고 소유한 모든 복사본을 삭제해야 합니다.", "당사는 귀하가 본 약관을 위반하거나 다른 사용자, 당사 또는 제3자에게 해를 끼친다고 당사가 판단하는 행위에 대해 사전 통지 없이 당사의 단독 재량으로 Sudoku 9에 대한 액세스를 종료 또는 중단할 권리를 보유합니다."] },
                    s10: { heading: "10. 준거법", text: ["본 약관은 <strong>터키</strong> 법률에 따라 규율되고 해석되며, 그 충돌법 조항은 고려하지 않습니다. 본 약관에서 발생하는 모든 분쟁은 터키의 관할 법원의 독점적 관할권을 따릅니다.", "귀하가 유럽 연합의 소비자인 경우, 귀하가 거주하는 국가의 법률에 따른 모든 의무적 보호 조항의 혜택을 받을 수도 있습니다."] },
                    s11: { heading: "11. 분리 가능성", text: ["본 약관의 어떤 조항이 적용 법률에 따라 무효, 불법 또는 집행 불가능한 것으로 판명되면 해당 조항은 집행 가능하도록 하는 데 필요한 최소한의 범위 내에서 수정되며, 나머지 조항은 계속해서 완전한 효력을 유지합니다."] },
                    s12: { heading: "12. 완전한 합의", text: ["본 약관은 당사의 <a href=\"privacy-policy.html\">개인정보 처리방침</a>과 함께 Sudoku 9에 관한 귀하와 Hexlume Games 간의 완전한 합의를 구성하며, 모든 이전 또는 동시대의 합의, 진술 또는 이해를 대체합니다."] },
                    contact: { heading: "문의하기", pre: "본 약관에 대해 질문이 있으신가요? 다음으로 연락해 주세요:", sub: "Hexlume Games &nbsp;·&nbsp; 독립 게임 개발자" }
                }
            },
            hi: {
                label: "🇮🇳 हिंदी", dir: "ltr", title: "सेवा की शर्तें",
                sections: {
                    agreement: { badge: "समझौता", text: ["ये सेवा की शर्तें (\"शर्तें\") <strong>Sudoku 9</strong> के आपके उपयोग को नियंत्रित करती हैं, जो <strong>Hexlume Games</strong> (\"हम\", \"हमारा\") द्वारा विकसित और प्रकाशित एक मोबाइल एप्लिकेशन है। Sudoku 9 को डाउनलोड, इंस्टॉल या उपयोग करके आप इन शर्तों से बंधे होने के लिए सहमत होते हैं।", "यदि आप इन शर्तों से सहमत नहीं हैं, तो एप्लिकेशन का उपयोग न करें।"] },
                    s1: { heading: "1. उपयोग का लाइसेंस", text: ["Hexlume Games आपको एक सीमित, गैर-अनन्य, अहस्तांतरणीय, वापस लेने योग्य लाइसेंस प्रदान करता है जो आपके स्वामित्व या नियंत्रण वाले डिवाइस पर Sudoku 9 को डाउनलोड करने और उपयोग करने के लिए है, केवल आपके व्यक्तिगत, गैर-व्यावसायिक मनोरंजन उद्देश्यों के लिए।", "आप यह नहीं कर सकते:"], items: ["ऐप के आधार पर कॉपी, संशोधित, अनुकूलित, अनुवाद या व्युत्पन्न कार्य बना सकते हैं।", "रिवर्स इंजीनियर, डीकंपाइल, डिसअसेंबल या सोर्स कोड प्राप्त करने का प्रयास कर सकते हैं।", "ऐप या उसमें किसी भी अधिकार को किसी तीसरे पक्ष को बेच, उपलाइसेंस, वितरित या हस्तांतरित कर सकते हैं।", "ऐप पर किसी भी मालिकाना नोटिस, लेबल या निशान को हटा या बदल सकते हैं।", "हमारी पूर्व लिखित सहमति के बिना ऐप का उपयोग किसी भी व्यावसायिक उद्देश्य के लिए कर सकते हैं।"] },
                    s2: { heading: "2. बौद्धिक संपदा", text: ["Sudoku 9 और इसकी सभी सामग्री — जिसमें ग्राफिक्स, ध्वनियाँ, कोड, गेम मैकेनिक्स, ट्रेड ड्रेस और Hexlume Games ब्रांड शामिल हैं, लेकिन इन्हीं तक सीमित नहीं — Hexlume Games या इसके लाइसेंसकर्ताओं की अनन्य संपत्ति है और लागू बौद्धिक संपदा कानूनों द्वारा संरक्षित है।", "सुडोकू के मानक गणितीय नियम सार्वजनिक डोमेन में हैं। हमारा कार्यान्वयन, कलाकृति, ऑडियो और सॉफ्टवेयर मालिकाना हैं।"] },
                    s3: { heading: "3. इन-ऐप विज्ञापन", text: ["Sudoku 9 खेलने के लिए स्वतंत्र है और <strong>Google AdMob</strong> द्वारा दिए गए विज्ञापनों द्वारा समर्थित है। ऐप का उपयोग करके आप विज्ञापनों के प्रदर्शन के लिए सहमत होते हैं, जिसमें बैनर विज्ञापन, इंटरस्टीशियल विज्ञापन और पुरस्कृत वीडियो विज्ञापन शामिल हो सकते हैं।", "आप पहले लॉन्च पर सहमति स्क्रीन के माध्यम से, या किसी भी समय ऐप के सेटिंग मेनू के माध्यम से व्यक्तिगत या गैर-व्यक्तिगत विज्ञापन प्राप्त करना चुन सकते हैं। व्यक्तिगत विज्ञापनों के लिए सहमति वापस लेने से ऐप से विज्ञापन नहीं हटते हैं।"] },
                    s4: { heading: "4. उपयोगकर्ता आचरण", text: ["आप Sudoku 9 का उपयोग न करने के लिए सहमत हैं:"], items: ["ऐप की अखंडता या प्रदर्शन में हस्तक्षेप या व्यवधान डालने के लिए।", "ऐप या संबंधित सिस्टम के किसी भी हिस्से में अनधिकृत पहुंच प्राप्त करने का प्रयास करने के लिए।", "गेम डेटा में हेरफेर करने के लिए स्वचालित स्क्रिप्ट, बॉट या धोखाधड़ी सॉफ़्टवेयर का उपयोग करने के लिए।", "किसी भी लागू स्थानीय, राष्ट्रीय या अंतर्राष्ट्रीय कानून या विनियमन का उल्लंघन करने के लिए।"], note: "हम इन नियमों के उल्लंघन के लिए ऐप तक आपकी पहुंच समाप्त करने का अधिकार सुरक्षित रखते हैं।" },
                    s5: { heading: "5. गोपनीयता", text: ["Sudoku 9 का आपका उपयोग हमारी <a href=\"privacy-policy.html\">गोपनीयता नीति</a> द्वारा भी नियंत्रित होता है, जो संदर्भ द्वारा इन शर्तों में शामिल है। कृपया हमारी प्रथाओं को समझने के लिए इसे ध्यान से देखें।"] },
                    s6: { heading: "6. अस्वीकरण और वारंटी", text: ["Sudoku 9 <strong>\"जैसा है\"</strong> और <strong>\"जैसा उपलब्ध\"</strong> किसी भी प्रकार की वारंटी के बिना प्रदान किया जाता है, चाहे वह व्यक्त हो या परोक्ष, जिसमें व्यापारिकता, किसी विशेष उद्देश्य के लिए उपयुक्तता, या गैर-उल्लंघन की वारंटी शामिल है, लेकिन इन्हीं तक सीमित नहीं है।", "हम यह वारंटी नहीं देते हैं कि ऐप निर्बाध, त्रुटि-मुक्त, सुरक्षित या वायरस या अन्य हानिकारक घटकों से मुक्त होगा। हम किसी भी सामग्री की सटीकता, विश्वसनीयता या पूर्णता के संबंध में कोई वारंटी नहीं देते हैं।"] },
                    s7: { heading: "7. दायित्व की सीमा", text: ["लागू कानून द्वारा अनुमत पूर्ण सीमा तक, Hexlume Games और उसके मालिकों, सहयोगियों, कर्मचारियों और एजेंटों Sudoku 9 के आपके उपयोग (या उपयोग करने में असमर्थता) के परिणामस्वरूप या उसके संबंध में उत्पन्न होने वाले किसी भी अप्रत्यक्ष, आकस्मिक, विशेष, परिणामी, दंडात्मक या अनुकरणीय नुकसान — जिसमें डेटा की हानि, लाभ की हानि, या सद्भावना की हानि शामिल है, लेकिन इन्हीं तक सीमित नहीं — के लिए उत्तरदायी नहीं होंगे।", "इन शर्तों या ऐप के आपके उपयोग से उत्पन्न होने वाले किसी भी दावे के लिए आपके प्रति हमारी कुल संचयी देयता, दावे से पहले बारह महीनों में Hexlume Games को आपके द्वारा भुगतान की गई (यदि कोई हो) राशि से अधिक नहीं होगी।"] },
                    s8: { heading: "8. अद्यतन और संशोधन", text: ["हम बिना सूचना के किसी भी समय Sudoku 9 (या इसके किसी भी भाग) को अद्यतन, संशोधित या बंद कर सकते हैं। हम किसी भी समय इस पृष्ठ पर संशोधित संस्करण को एक नई \"अंतिम अद्यतन\" तिथि के साथ पोस्ट करके इन शर्तों को भी अद्यतन कर सकते हैं।", "परिवर्तन पोस्ट किए जाने के बाद ऐप का आपका निरंतर उपयोग अद्यतन शर्तों की स्वीकृति का गठन करता है। यदि आप किसी भी परिवर्तन से असहमत हैं, तो आपको ऐप का उपयोग बंद कर देना चाहिए।"] },
                    s9: { heading: "9. समाप्ति", text: ["ये शर्तें समाप्त होने तक प्रभावी रहती हैं। यदि आप किसी भी शर्त का पालन करने में विफल रहते हैं तो इन शर्तों के तहत आपके अधिकार हमारी सूचना के बिना स्वचालित रूप से समाप्त हो जाएंगे। समाप्ति पर, आपको ऐप के सभी उपयोग बंद करने होंगे और अपने कब्जे में सभी प्रतियों को हटाना होगा।", "हम अपने एकमात्र विवेक पर, बिना पूर्व सूचना के, उस आचरण के लिए Sudoku 9 तक पहुंच समाप्त करने या निलंबित करने का अधिकार सुरक्षित रखते हैं, जिसके बारे में हम मानते हैं कि यह इन शर्तों का उल्लंघन करता है या अन्य उपयोगकर्ताओं, हमें या तीसरे पक्षों के लिए हानिकारक है।"] },
                    s10: { heading: "10. शासी कानून", text: ["ये शर्तें <strong>तुर्की</strong> के कानूनों द्वारा शासित और व्याख्या की जाएंगी, इसके कानूनों के टकराव के प्रावधानों की परवाह किए बिना। इन शर्तों से उत्पन्न होने वाला कोई भी विवाद तुर्की के सक्षम न्यायालयों के अनन्य क्षेत्राधिकार के अधीन होगा।", "यदि आप यूरोपीय संघ में एक उपभोक्ता हैं, तो आप उस देश के कानून के किसी भी अनिवार्य सुरक्षात्मक प्रावधान से भी लाभान्वित हो सकते हैं जिसमें आप रहते हैं।"] },
                    s11: { heading: "11. पृथक्करणीयता", text: ["यदि इन शर्तों का कोई प्रावधान लागू कानून के तहत अमान्य, अवैध या अप्रवर्तनीय पाया जाता है, तो ऐसे प्रावधान को इसे प्रवर्तनीय बनाने के लिए आवश्यक न्यूनतम सीमा तक संशोधित किया जाएगा, और शेष प्रावधान पूर्ण रूप से प्रभावी रहेंगे।"] },
                    s12: { heading: "12. संपूर्ण समझौता", text: ["ये शर्तें, हमारी <a href=\"privacy-policy.html\">गोपनीयता नीति</a> के साथ, Sudoku 9 के संबंध में आपके और Hexlume Games के बीच संपूर्ण समझौते का गठन करती हैं और सभी पिछले या समकालीन समझौतों, प्रतिनिधित्वों या समझों को प्रतिस्थापित करती हैं।"] },
                    contact: { heading: "संपर्क करें", pre: "इन शर्तों के बारे में प्रश्न? हमसे यहाँ संपर्क करें:", sub: "Hexlume Games &nbsp;·&nbsp; स्वतंत्र गेम डेवलपर" }
                }

            nl: {

                sections: {
                    agreement: { badge: "Overeenkomst", text: ["Deze Servicevoorwaarden (\"Voorwaarden\") zijn van toepassing op uw gebruik van <strong>Sudoku 9</strong>, een mobiele applicatie ontwikkeld en uitgegeven door <strong>Hexlume Games</strong> (\"wij\", \"ons\", \"onze\"). Door Sudoku 9 te downloaden, installeren of te gebruiken, gaat u akkoord met deze Voorwaarden.", "Als u niet akkoord gaat met deze Voorwaarden, gebruik de applicatie dan niet."] },

                    s2: { heading: "2. Intellectueel Eigendom", text: ["Sudoku 9 en alle inhoud — inclusief maar niet beperkt tot afbeeldingen, geluiden, code, spelmechanismen, handelskleding en het merk Hexlume Games — zijn exclusief eigendom van Hexlume Games of haar licentiegevers en worden beschermd door toepasselijke intellectuele-eigendomswetten.", "De standaard wiskundige regels van Sudoku behoren tot het publieke domein. Onze implementatie, artwork, audio en software zijn eigendomsrechtelijk beschermd."] },
                    s3: { heading: "3. In-App Advertenties", text: ["Sudoku 9 is gratis te spelen en wordt ondersteund door advertenties van <strong>Google AdMob</strong>. Door de app te gebruiken gaat u akkoord met het tonen van advertenties, waaronder banneradvertenties, interstitial-advertenties en beloonde video-advertenties.", "U kunt via het toestemmingsscherm bij de eerste start of via het instellingenmenu van de app kiezen of u gepersonaliseerde of niet-gepersonaliseerde advertenties wilt ontvangen. Het intrekken van toestemming voor gepersonaliseerde advertenties verwijdert geen advertenties uit de app."] },
                    s4: { heading: "4. Gebruikersgedrag", text: ["U stemt ermee in Sudoku 9 niet te gebruiken om:"], items: ["De integriteit of prestaties van de app te verstoren.", "Ongeautoriseerde toegang te verkrijgen tot delen van de app of gerelateerde systemen.", "Geautomatiseerde scripts, bots of cheatersoftware te gebruiken om spelgegevens te manipuleren.", "Toepasselijke lokale, nationale of internationale wetten of regels te overtreden."], note: "We behouden ons het recht voor uw toegang tot de app te beëindigen bij overtreding van deze regels." },
                    s5: { heading: "5. Privacy", text: ["Uw gebruik van Sudoku 9 valt ook onder onze <a href=\"privacy-policy.html\">Privacyverklaring</a>, die door verwijzing in deze Voorwaarden is opgenomen. Lees deze zorgvuldig door om onze werkwijzen te begrijpen."] },
                    s6: { heading: "6. Disclaimers & Garantie", text: ["Sudoku 9 wordt verstrekt <strong>\"zoals het is\"</strong> en <strong>\"zoals beschikbaar\"</strong> zonder enige garantie van welke aard dan ook, uitdrukkelijk of impliciet, inclusief maar niet beperkt tot garanties van verkoopbaarheid, geschiktheid voor een bepaald doel of niet-inbreuk.", "We garanderen niet dat de app ononderbroken, foutloos, veilig of vrij van virussen of andere schadelijke componenten zal zijn. We geven geen garantie over de juistheid, betrouwbaarheid of volledigheid van enige inhoud."] },
                    s7: { heading: "7. Beperking van Aansprakelijkheid", text: ["Voor zover toegestaan door toepasselijk recht, zijn Hexlume Games en haar eigenaren, dochterondernemingen, werknemers en agenten niet aansprakelijk voor indirecte, incidentele, speciale, gevolg-, punitieve of voorbeeldige schade — inclusief maar niet beperkt tot verlies van gegevens, winst of goodwill — die voortvloeien uit of verband houden met uw gebruik (of onvermogen om te gebruiken) van Sudoku 9.", "Onze totale cumulatieve aansprakelijkheid jegens u voor claims die voortvloeien uit deze Voorwaarden of uw gebruik van de app, overschrijdt niet het bedrag dat u (indien van toepassing) in de twaalf maanden voorafgaand aan de claim aan Hexlume Games hebt betaald."] },
                    s8: { heading: "8. Updates en Wijzigingen", text: ["We kunnen Sudoku 9 (of delen ervan) op elk moment zonder kennisgeving bijwerken, wijzigen of stopzetten. We kunnen deze Voorwaarden ook op elk moment bijwerken door de herziene versie op deze pagina te plaatsen met een nieuwe datum \"Laatst bijgewerkt\".", "Uw voortgezette gebruik van de app na het plaatsen van wijzigingen vormt uw acceptatie van de bijgewerkte Voorwaarden. Als u het niet eens bent met wijzigingen, moet u stoppen met het gebruik van de app."] },
                    s9: { heading: "9. Beëindiging", text: ["Deze Voorwaarden blijven van kracht tot ze worden beëindigd. Uw rechten onder deze Voorwaarden zullen automatisch zonder kennisgeving van ons eindigen als u niet aan een voorwaarde voldoet. Bij beëindiging moet u al het gebruik van de app staken en alle kopieën in uw bezit verwijderen.", "We behouden ons het recht voor om de toegang tot Sudoku 9 naar eigen goeddunken, zonder voorafgaande kennisgeving, te beëindigen of op te schorten voor gedrag waarvan wij menen dat het deze Voorwaarden schendt of schadelijk is voor andere gebruikers, ons of derden."] },
                    s10: { heading: "10. Toepasselijk Recht", text: ["Deze Voorwaarden worden beheerst door en geïnterpreteerd in overeenstemming met de wetten van <strong>Turkije</strong>, zonder rekening te houden met de conflicterende wettelijke bepalingen. Geschillen die voortvloeien uit deze Voorwaarden vallen onder de exclusieve jurisdictie van de bevoegde rechtbanken van Turkije.", "Als u een consument bent in de Europese Unie, kunt u ook profiteren van dwingende beschermingsbepalingen van de wet van het land waar u woont."] },
                    s11: { heading: "11. Scheidbaarheid", text: ["Indien een bepaling van deze Voorwaarden ongeldig, onwettig of niet-afdwingbaar blijkt onder toepasselijk recht, wordt die bepaling gewijzigd in de minimale mate die nodig is om deze afdwingbaar te maken, en blijven de overige bepalingen volledig van kracht."] },
                    s12: { heading: "12. Volledige Overeenkomst", text: ["Deze Voorwaarden, samen met onze <a href=\"privacy-policy.html\">Privacyverklaring</a>, vormen de volledige overeenkomst tussen u en Hexlume Games met betrekking tot Sudoku 9 en vervangen alle eerdere of gelijktijdige overeenkomsten, verklaringen of inzichten."] },
                    contact: { heading: "Neem Contact Op", pre: "Vragen over deze Voorwaarden? Neem contact met ons op via:", sub: "Hexlume Games &nbsp;·&nbsp; Onafhankelijke game-ontwikkelaar" }

            pl: {
                label: "🇵🇱 Polski", dir: "ltr", title: "Warunki korzystania",
                sections: {
                    agreement: { badge: "Umowa", text: ["Niniejsze Warunki korzystania („Warunki”) regulują korzystanie z <strong>Sudoku 9</strong>, aplikacji mobilnej opracowanej i opublikowanej przez <strong>Hexlume Games</strong> („my”, „nas”, „nasz”). Pobierając, instalując lub używając Sudoku 9, wyrażasz zgodę na przestrzeganie niniejszych Warunków.", "Jeśli nie zgadzasz się z niniejszymi Warunkami, nie korzystaj z aplikacji."] },
                    s1: { heading: "1. Licencja na użytkowanie", text: ["Hexlume Games udziela Ci ograniczonej, niewyłącznej, niezbywalnej, odwołalnej licencji na pobranie i używanie Sudoku 9 na urządzeniu, które posiadasz lub kontrolujesz, wyłącznie do celów osobistej, niekomercyjnej rozrywki.", "Nie możesz:"], items: ["Kopiować, modyfikować, dostosowywać, tłumaczyć ani tworzyć utworów zależnych w oparciu o aplikację.", "Poddawać reverse engineeringowi, dekompilować, deasemblować ani próbować uzyskać kodu źródłowego.", "Sprzedawać, sublicencjonować, rozpowszechniać ani przenosić aplikacji lub jakichkolwiek praw do niej na osoby trzecie.", "Usuwać ani zmieniać żadnych oznaczeń własności, etykiet ani znaków w aplikacji.", "Używać aplikacji do jakichkolwiek celów komercyjnych bez naszej uprzedniej pisemnej zgody."] },
                    s2: { heading: "2. Własność intelektualna", text: ["Sudoku 9 i cała jego zawartość — w tym między innymi grafika, dźwięki, kod, mechanika gry, wygląd handlowy i marka Hexlume Games — są wyłączną własnością Hexlume Games lub jej licencjodawców i są chronione przez obowiązujące przepisy prawa własności intelektualnej.", "Standardowe zasady matematyczne Sudoku należą do domeny publicznej. Nasza implementacja, grafika, dźwięk i oprogramowanie są własnością zastrzeżoną."] },
                    s3: { heading: "3. Reklamy w aplikacji", text: ["Sudoku 9 jest darmowe i wspierane przez reklamy dostarczane przez <strong>Google AdMob</strong>. Korzystając z aplikacji, wyrażasz zgodę na wyświetlanie reklam, które mogą obejmować reklamy banerowe, reklamy pełnoekranowe i nagradzane filmy wideo.", "Możesz wybrać, czy otrzymywać spersonalizowane czy niespersonalizowane reklamy za pośrednictwem ekranu zgody przy pierwszym uruchomieniu lub w dowolnym momencie przez menu Ustawienia aplikacji. Wycofanie zgody na spersonalizowane reklamy nie usuwa reklam z aplikacji."] },
                    s4: { heading: "4. Zachowanie użytkownika", text: ["Zgadzasz się nie używać Sudoku 9 do:"], items: ["Zakłócania integralności lub wydajności aplikacji.", "Próby uzyskania nieautoryzowanego dostępu do jakiejkolwiek części aplikacji lub powiązanych systemów.", "Używania zautomatyzowanych skryptów, botów lub oprogramowania do oszukiwania w celu manipulowania danymi gry.", "Naruszenia jakichkolwiek obowiązujących przepisów lokalnych, krajowych lub międzynarodowych."], note: "Zastrzegamy sobie prawo do zakończenia Twojego dostępu do aplikacji w przypadku naruszenia tych zasad." },
                    s5: { heading: "5. Prywatność", text: ["Twoje korzystanie z Sudoku 9 podlega również naszej <a href=\"privacy-policy.html\">Polityce prywatności</a>, która została włączona do niniejszych Warunków przez odniesienie. Prosimy o dokładne zapoznanie się z nią, aby zrozumieć nasze praktyki."] },
                    s6: { heading: "6. Wyłączenia odpowiedzialności i gwarancja", text: ["Sudoku 9 jest dostarczane <strong>„tak jak jest”</strong> i <strong>„tak jak dostępne”</strong> bez jakichkolwiek gwarancji, wyraźnych lub domniemanych, w tym między innymi gwarancji przydatności handlowej, przydatności do określonego celu lub nienaruszania praw.", "Nie gwarantujemy, że aplikacja będzie nieprzerwana, wolna od błędów, bezpieczna lub wolna od wirusów lub innych szkodliwych komponentów. Nie udzielamy żadnych gwarancji co do dokładności, wiarygodności lub kompletności jakichkolwiek treści."] },
                    s7: { heading: "7. Ograniczenie odpowiedzialności", text: ["W maksymalnym zakresie dozwolonym przez obowiązujące prawo, Hexlume Games oraz jej właściciele, podmioty stowarzyszone, pracownicy i agenci nie ponoszą odpowiedzialności za jakiekolwiek szkody pośrednie, przypadkowe, specjalne, wtórne, karne lub przykładowe — w tym między innymi utratę danych, utratę zysków lub utratę wartości firmy — wynikające z lub związane z korzystaniem (lub niemożnością korzystania) z Sudoku 9.", "Nasza całkowita skumulowana odpowiedzialność wobec Ciebie z tytułu jakichkolwiek roszczeń wynikających z niniejszych Warunków lub korzystania przez Ciebie z aplikacji nie przekroczy kwoty, którą zapłaciłeś (jeśli w ogóle) firmie Hexlume Games w ciągu dwunastu miesięcy poprzedzających roszczenie."] },
                    s8: { heading: "8. Aktualizacje i modyfikacje", text: ["Możemy w dowolnym momencie bez powiadomienia aktualizować, modyfikować lub zaprzestać świadczenia Sudoku 9 (lub jego części). Możemy również w dowolnym momencie zaktualizować niniejsze Warunki, publikując poprawioną wersję na tej stronie z nową datą „Ostatnia aktualizacja”.", "Kontynuowanie korzystania z aplikacji po opublikowaniu zmian oznacza akceptację zaktualizowanych Warunków. Jeśli nie zgadzasz się z jakimikolwiek zmianami, musisz zaprzestać korzystania z aplikacji."] },
                    s9: { heading: "9. Rozwiązanie", text: ["Niniejsze Warunki obowiązują do czasu ich rozwiązania. Twoje prawa wynikające z niniejszych Warunków wygasną automatycznie bez powiadomienia z naszej strony, jeśli nie zastosujesz się do któregokolwiek postanowienia. Po rozwiązaniu umowy musisz zaprzestać wszelkiego korzystania z aplikacji i usunąć wszystkie kopie znajdujące się w Twoim posiadaniu.", "Zastrzegamy sobie prawo do rozwiązania lub zawieszenia dostępu do Sudoku 9 według naszego uznania, bez wcześniejszego powiadomienia, w przypadku zachowania, które naszym zdaniem narusza niniejsze Warunki lub jest szkodliwe dla innych użytkowników, nas lub osób trzecich."] },
                    s10: { heading: "10. Prawo właściwe", text: ["Niniejsze Warunki podlegają prawu <strong>Turcji</strong> i są zgodnie z nim interpretowane, bez względu na jego przepisy dotyczące kolizji praw. Wszelkie spory wynikające z niniejszych Warunków podlegają wyłącznej jurysdykcji właściwych sądów Turcji.", "Jeśli jesteś konsumentem w Unii Europejskiej, możesz również skorzystać z wszelkich obowiązkowych przepisów ochronnych prawa kraju, w którym mieszkasz."] },
                    s11: { heading: "11. Podzielność", text: ["Jeśli którekolwiek postanowienie niniejszych Warunków zostanie uznane za nieważne, niezgodne z prawem lub niewykonalne na mocy obowiązującego prawa, postanowienie to zostanie zmienione w minimalnym zakresie niezbędnym do uczynienia go wykonalnym, a pozostałe postanowienia pozostają w pełnej mocy."] },
                    s12: { heading: "12. Całość umowy", text: ["Niniejsze Warunki, wraz z naszą <a href=\"privacy-policy.html\">Polityką prywatności</a>, stanowią całość umowy między Tobą a Hexlume Games dotyczącą Sudoku 9 i zastępują wszelkie wcześniejsze lub równoczesne umowy, oświadczenia lub porozumienia."] },
                    contact: { heading: "Kontakt", pre: "Pytania dotyczące niniejszych Warunków? Skontaktuj się z nami:", sub: "Hexlume Games &nbsp;·&nbsp; Niezależny deweloper gier" }
                }

                    s5: { heading: "5. Integritet", text: ["Din användning av Sudoku 9 styrs också av vår <a href=\"privacy-policy.html\">Integritetspolicy</a>, som införlivas i dessa Villkor genom hänvisning. Läs den noggrant för att förstå våra rutiner."] },

                    s7: { heading: "7. Begränsning av ansvar", text: ["I den utsträckning som tillåts enligt tillämplig lag, ska Hexlume Games och dess ägare, dotterbolag, anställda och ombud inte vara ansvariga för indirekta, tillfälliga, speciella, följdskador, straffskador eller exemplariska skador — inklusive men inte begränsat till förlust av data, vinst eller goodwill — som uppstår till följd av eller i samband med din användning (eller oförmåga att använda) Sudoku 9.", "Vårt totala kumulativa ansvar gentemot dig för eventuella krav som härrör från dessa Villkor eller din användning av appen ska inte överstiga det belopp du har betalat (om något) till Hexlume Games under de tolv månaderna före kravet."] },
                    s8: { heading: "8. Uppdateringar och ändringar", text: ["Vi kan när som helst utan föregående meddelande uppdatera, ändra eller avbryta Sudoku 9 (eller delar av den). Vi kan också när som helst uppdatera dessa Villkor genom att publicera den reviderade versionen på denna sida med ett nytt datum \"Senast uppdaterad\".", "Din fortsatta användning av appen efter att ändringar publicerats innebär att du accepterar de uppdaterade Villkoren. Om du inte godkänner några ändringar måste du sluta använda appen."] },

                    s11: { heading: "11. Separabilitet", text: ["Om någon bestämmelse i dessa Villkor befinns ogiltig, olaglig eller inte verkställbar enligt tillämplig lag, ska den bestämmelsen ändras i den utsträckning som krävs för att göra den verkställbar, och de återstående bestämmelserna fortsätter att gälla."] },
